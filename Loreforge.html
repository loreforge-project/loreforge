<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loreforge — 세계관 구축 도구</title>
<style>
  :root{
    --bg:#1a1b26; --panel:#24283b; --panel2:#1f2335; --line:#343a52;
    --text:#c0caf5; --muted:#7a83a8; --accent:#7aa2f7; --accent2:#bb9af7;
    --gold:#e0af68; --green:#9ece6a; --red:#f7768e;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{font-family:"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
    background:var(--bg); color:var(--text); overflow:hidden; font-size:14px;
    display:flex; flex-direction:column;}
  button{font-family:inherit; cursor:pointer;}

  /* Top bar */
  #topbar{min-height:52px; display:flex; flex-wrap:wrap; align-items:center; gap:8px 12px; padding:7px 16px;
    background:var(--panel2); border-bottom:1px solid var(--line); flex-shrink:0;}
  #topbar h1{font-size:16px; font-weight:700; color:#fff; letter-spacing:.5px;}
  #topbar h1 span{color:var(--accent);}
  #topbar h1 em{font-style:normal; font-size:11px; color:var(--muted); font-weight:500; letter-spacing:0; margin-left:3px;}
  #worldTitle{background:transparent; border:1px solid transparent; color:var(--text);
    font-size:14px; padding:5px 8px; border-radius:6px; min-width:180px;}
  #worldTitle:hover,#worldTitle:focus{border-color:var(--line); outline:none; background:var(--bg);}
  .tabs{display:flex; gap:4px; margin-left:8px; flex-shrink:0;}
  .tab{background:transparent; border:1px solid var(--line); color:var(--muted);
    padding:6px 14px; border-radius:6px; font-size:13px; white-space:nowrap; flex-shrink:0;}
  .tab.active{background:var(--accent); color:#0b0e18; border-color:var(--accent); font-weight:600;}
  .spacer{flex:1; min-width:12px;}
  .tb-actions{display:flex; flex-wrap:wrap; align-items:center; gap:8px;}
  .btn{background:var(--panel); border:1px solid var(--line); color:var(--text);
    padding:7px 13px; border-radius:6px; font-size:13px; white-space:nowrap; flex-shrink:0;}
  .btn:hover{border-color:var(--accent); color:#fff;}
  .btn.primary{background:var(--accent); color:#0b0e18; border-color:var(--accent); font-weight:600;}

  /* Layout */
  #main{display:flex; flex:1; min-height:0;}
  #left{width:270px; background:var(--panel2); border-right:1px solid var(--line);
    display:flex; flex-direction:column;}
  #center{flex:1; position:relative; overflow:hidden; background:var(--bg);}
  #right{width:320px; background:var(--panel2); border-left:1px solid var(--line);
    display:flex; flex-direction:column; position:relative; flex-shrink:0;}
  #rightResizer{position:absolute; left:-3px; top:0; width:7px; height:100%; cursor:col-resize; z-index:20;}
  #rightResizer::after{content:""; position:absolute; left:2px; top:0; width:2px; height:100%; background:transparent;}
  #rightResizer:hover::after, #rightResizer.drag::after{background:var(--accent);}

  .panel-head{padding:12px 14px; border-bottom:1px solid var(--line); font-weight:700;
    color:#fff; font-size:13px; display:flex; align-items:center; gap:8px;}
  .scroll{overflow-y:auto; flex:1; padding:10px;}
  .scroll::-webkit-scrollbar{width:8px;}
  .scroll::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}

  #search{width:100%; padding:8px 10px; background:var(--bg); border:1px solid var(--line);
    border-radius:6px; color:var(--text); font-size:13px; margin-bottom:10px;}
  #search:focus{outline:none; border-color:var(--accent);}

  .cat-group{margin-bottom:14px;}
  .cat-title{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted);
    display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; padding:2px 4px;
    cursor:pointer; border-radius:5px;}
  .cat-title:hover{background:var(--panel); color:var(--text);}
  .tw{display:inline-block; width:16px; text-align:center; color:var(--muted); cursor:pointer;
    font-size:11px; user-select:none;}
  .tw:hover{color:#fff;}
  .tw-empty{display:inline-block; width:16px;}
  .cat-tw{display:inline-block; width:14px; text-align:center; font-size:11px; color:var(--muted);}
  .cat-title:hover .cat-tw{color:var(--text);}
  .cat-add{background:transparent; border:none; color:var(--accent); font-size:16px; line-height:1;
    width:20px; height:20px; border-radius:4px;}
  .cat-add:hover{background:var(--line); color:#fff;}
  .item{display:flex; align-items:center; gap:8px; padding:7px 9px; border-radius:6px;
    cursor:pointer; font-size:13px;}
  .item:hover{background:var(--panel);}
  .item.sel{background:var(--accent); color:#0b0e18;}
  .dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .item .nm{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .empty{color:var(--muted); font-size:12px; padding:4px 9px; font-style:italic;}

  /* Map */
  #mapWrap{position:absolute; inset:0; cursor:grab;}
  #mapWrap.placing{cursor:crosshair;}
  #mapWrap.grabbing{cursor:grabbing;}
  #viewport{position:absolute; top:0; left:0; transform-origin:0 0;}
  #mapbg{position:absolute; top:0; left:0; width:4000px; height:3000px; background:#161821;}
  #terrain,#terrainBase{position:absolute; top:0; left:0; width:4000px; height:3000px;}
  #grid{position:absolute; top:0; left:0; width:4000px; height:3000px;
    background-image:
      linear-gradient(rgba(90,100,140,.18) 1px,transparent 1px),
      linear-gradient(90deg,rgba(90,100,140,.18) 1px,transparent 1px);
    background-size:50px 50px; pointer-events:none;}
  #edges{position:absolute; top:0; left:0; width:4000px; height:3000px; pointer-events:none;}
  #measure{position:absolute; top:0; left:0; width:4000px; height:3000px; pointer-events:none; z-index:4;}
  #scaleBar{position:absolute; bottom:44px; right:16px; z-index:5; display:none; text-align:center;
    background:rgba(36,40,59,.9); border:1px solid var(--line); border-radius:6px; padding:5px 10px;}
  #scaleBar .sb-line{height:4px; background:var(--text); border-radius:2px; margin:0 auto 3px;}
  #scaleBar span{font-size:11px; color:var(--muted);}
  #areas{position:absolute; top:0; left:0; width:4000px; height:3000px; pointer-events:none; z-index:1;}
  #areas path[data-id]{pointer-events:auto; cursor:move;}
  #areas.locked path[data-id]{pointer-events:none;}
  #areas circle.vh{fill:#fff; stroke:var(--accent); pointer-events:auto; cursor:grab;}
  #areas circle.vh.mid{fill:var(--accent); stroke:#0b0e18; opacity:.5; cursor:copy;}
  #areas circle.vh.hole{stroke:var(--red);}
  #areas.locked circle.vh{pointer-events:none;}
  .area-label{fill:#fff; paint-order:stroke; stroke:rgba(0,0,0,.65); stroke-width:4px;
    text-anchor:middle; pointer-events:none; font-weight:700; font-size:15px;}
  .maplabel{position:absolute; transform:translate(-50%,-50%); cursor:pointer; user-select:none;
    font-weight:800; white-space:nowrap; letter-spacing:1px;
    text-shadow:0 1px 3px #000, 0 0 6px rgba(0,0,0,.7); z-index:2;}
  .maplabel.sel{outline:2px dashed var(--accent); outline-offset:3px; border-radius:3px;}
  #mapBar{position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:5;
    display:flex; align-items:center; gap:6px; background:rgba(31,35,53,.96);
    border:1px solid var(--line); border-radius:10px; padding:6px 8px;
    box-shadow:0 4px 16px rgba(0,0,0,.5); max-width:66%;}
  #mapBar select{background:var(--bg); color:var(--text); border:1px solid var(--line);
    border-radius:6px; padding:5px 8px; font-size:13px; max-width:220px;}
  #mapBar .mapcrumb{font-size:11px; color:var(--muted); white-space:nowrap;}
  #mapBar .btn.mini{padding:5px 9px; font-size:12px;}
  #areaControls{position:absolute; top:60px; left:50%; transform:translateX(-50%); display:none; gap:8px;
    align-items:center; background:rgba(31,35,53,.97); border:1px solid var(--line); border-radius:10px;
    padding:8px 12px; z-index:6; box-shadow:0 4px 16px rgba(0,0,0,.5);}
  #areaControls span{font-size:12px; color:var(--muted);}
  .pin{position:absolute; transform:translate(-50%,-100%); cursor:pointer; user-select:none;
    display:flex; flex-direction:column; align-items:center; z-index:2;}
  .pin .head{width:26px; height:26px; border-radius:50% 50% 50% 0; transform:rotate(-45deg);
    border:2px solid rgba(255,255,255,.85); box-shadow:0 2px 6px rgba(0,0,0,.5);
    display:flex; align-items:center; justify-content:center;}
  .pin .head span{transform:rotate(45deg); font-size:13px;}
  .pin .label{margin-top:3px; font-size:12px; background:rgba(15,17,26,.85); padding:2px 7px;
    border-radius:10px; white-space:nowrap; border:1px solid var(--line);}
  .pin.sel .label{background:var(--accent); color:#0b0e18; border-color:var(--accent); font-weight:600;}
  .pin.sel .head{border-color:var(--accent);}

  /* Map toolbar (top-left) */
  #mapToolbar{position:absolute; top:14px; left:14px; display:flex; flex-direction:column; gap:4px;
    background:rgba(31,35,53,.96); border:1px solid var(--line); border-radius:10px; padding:6px;
    box-shadow:0 4px 16px rgba(0,0,0,.5); z-index:5;}
  .tbtn{width:38px; height:38px; border-radius:8px; background:transparent; border:1px solid transparent;
    font-size:18px; display:flex; align-items:center; justify-content:center; color:var(--text);}
  .tbtn:hover{background:var(--panel); border-color:var(--line);}
  .tbtn.active{background:var(--accent); border-color:var(--accent);}
  .tsep{height:1px; background:var(--line); margin:3px 2px;}
  #brushPanel,#simplifyPanel{position:absolute; top:14px; left:64px; display:none; z-index:5;
    background:rgba(31,35,53,.97); border:1px solid var(--line); border-radius:10px; padding:12px;
    width:210px; box-shadow:0 4px 16px rgba(0,0,0,.5);}
  #brushPanel h4,#simplifyPanel h4{font-size:12px; color:#fff; margin-bottom:8px;}
  .icon-row{display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px;}
  .icon-b{width:30px; height:30px; border:1px solid var(--line); background:var(--bg);
    border-radius:6px; font-size:16px; cursor:pointer; line-height:1; padding:0;}
  .icon-b:hover{border-color:var(--accent);}
  .swatches{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:10px;}
  .sw{height:34px; border-radius:6px; border:2px solid transparent; cursor:pointer; position:relative;}
  .sw.sel{border-color:#fff;}
  .sw span{position:absolute; bottom:1px; left:0; right:0; font-size:9px; text-align:center;
    color:rgba(255,255,255,.9); text-shadow:0 1px 2px #000;}
  .brow{display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:12px; color:var(--muted);}
  .brow input[type=range]{flex:1;}
  .brow input[type=color]{width:34px; height:26px; border:1px solid var(--line); background:none; border-radius:5px; padding:0;}

  #mapHint{position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
    background:rgba(36,40,59,.95); border:1px solid var(--line); padding:8px 16px;
    border-radius:20px; font-size:12px; color:var(--muted); pointer-events:none;
    box-shadow:0 4px 12px rgba(0,0,0,.4);}
  #mapTools{position:absolute; bottom:16px; left:16px; display:flex; gap:8px;}
  #zoomInfo{position:absolute; bottom:16px; right:16px; font-size:12px; color:var(--muted);
    background:rgba(36,40,59,.9); padding:4px 10px; border-radius:6px; cursor:pointer; user-select:none;}
  #zoomInfo:hover{color:#fff;}

  /* 지도 크기 조절 핸들(양 끝·모서리를 드래그해 지도 캔버스 크기 변경) */
  #mapResize{position:absolute; top:0; left:0; z-index:3;}
  .rzh{position:absolute; width:12px; height:12px; margin:-6px 0 0 -6px; background:var(--accent);
    border:2px solid #0b0e18; border-radius:3px; box-shadow:0 1px 4px rgba(0,0,0,.5); opacity:.8;}
  .rzh:hover{opacity:1; background:#fff;}
  .rzh-n,.rzh-s{cursor:ns-resize;}
  .rzh-e,.rzh-w{cursor:ew-resize;}
  .rzh-ne,.rzh-sw{cursor:nesw-resize;}
  .rzh-nw,.rzh-se{cursor:nwse-resize;}
  #mapResizePreview{position:absolute; top:0; left:0; display:none; z-index:2; pointer-events:none;
    border:2px dashed var(--accent); background:rgba(122,162,247,.08); box-sizing:border-box;}

  /* Graph view */
  #graphView{position:absolute; inset:0; display:none;}
  #graphSvg{width:100%; height:100%;}
  #graphFilter{position:absolute; top:0; left:0; right:0; z-index:3; padding:10px 14px 18px;
    display:flex; flex-direction:column; gap:6px;
    background:linear-gradient(rgba(26,27,38,.97),rgba(26,27,38,.75),rgba(26,27,38,0));}
  .gf-row{display:flex; flex-wrap:wrap; gap:6px; align-items:center;}
  .gf-lbl{font-size:11px; color:var(--muted); width:60px; white-space:nowrap; flex-shrink:0;}
  .gf-chip{background:var(--panel); border:1px solid var(--line); color:var(--text); font-size:12px;
    padding:4px 11px; border-radius:14px; cursor:pointer;}
  .gf-chip:hover{border-color:var(--accent);}
  .gf-chip.on{background:var(--accent); border-color:var(--accent); color:#0b0e18; font-weight:600;}
  .gf-chip.mini{font-size:11px; color:var(--muted); padding:3px 9px;}
  /* Timeline view */
  #timelineView{position:absolute; inset:0; display:none; overflow-y:auto; padding:24px;}
  .tl-item{display:flex; gap:14px; margin-bottom:4px;}
  .tl-when{width:110px; text-align:right; color:var(--gold); font-size:13px; flex-shrink:0; padding-top:2px;}
  .tl-line{width:2px; background:var(--line); position:relative; flex-shrink:0;}
  .tl-line::before{content:''; position:absolute; top:4px; left:-4px; width:10px; height:10px;
    border-radius:50%; background:var(--red); border:2px solid var(--bg);}
  .tl-body{padding-bottom:20px; cursor:pointer;}
  .tl-body h4{font-size:14px; color:#fff;}
  .tl-body p{font-size:12px; color:var(--muted); margin-top:2px;}
  #tlBar{display:flex; align-items:center; gap:8px; margin-bottom:20px; flex-wrap:wrap;}
  .tl-mode{font-size:11px; color:var(--muted);}
  .tl-hint{font-size:11px; color:var(--muted); margin-left:4px;}
  .tl-move{display:flex; flex-direction:column; gap:3px; margin-left:6px; align-self:flex-start;}
  .tl-move button{background:var(--panel); border:1px solid var(--line); color:var(--text);
    width:28px; height:20px; border-radius:5px; font-size:10px; cursor:pointer; line-height:1;}
  .tl-move button:hover:not(:disabled){border-color:var(--accent); color:#fff;}
  .tl-move button:disabled{opacity:.3; cursor:default;}

  /* Right detail panel */
  #detail{padding:14px;}
  .det-none{color:var(--muted); font-style:italic; padding:20px 4px; text-align:center; font-size:13px;}
  .det-head{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .det-badge{font-size:11px; padding:3px 9px; border-radius:12px; color:#0b0e18; font-weight:700;}
  input.f,textarea.f,select.f{width:100%; background:var(--bg); border:1px solid var(--line);
    color:var(--text); border-radius:6px; padding:8px 10px; font-size:13px; font-family:inherit;
    margin-bottom:10px;}
  input.f:focus,textarea.f:focus,select.f:focus{outline:none; border-color:var(--accent);}
  textarea.f{resize:vertical; min-height:70px;}
  label.fl{display:block; font-size:11px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.5px; margin-bottom:4px;}
  .sect{margin-top:16px; border-top:1px solid var(--line); padding-top:14px;}
  .sect h3{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;
    margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;}
  .link-row{display:flex; align-items:center; gap:8px; padding:6px 8px; background:var(--panel);
    border-radius:6px; margin-bottom:5px; font-size:13px;}
  .link-row .rel{font-size:11px; color:var(--gold);}
  .link-row .nm{flex:1; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .link-row .nm:hover{color:#fff; text-decoration:underline;}
  .x{background:transparent; border:none; color:var(--muted); font-size:15px; line-height:1;}
  .x:hover{color:var(--red);}
  .del-btn{width:100%; margin-top:16px; background:transparent; border:1px solid var(--red);
    color:var(--red); padding:8px; border-radius:6px; font-size:13px;}
  .del-btn:hover{background:var(--red); color:#fff;}
  .tag{display:inline-block; background:var(--line); color:var(--text); font-size:11px;
    padding:2px 8px; border-radius:10px; margin:2px 3px 2px 0;}
  #saveStatus{font-size:11px; color:var(--muted); margin-right:4px; min-width:78px; text-align:right;}
  #fileInfo{font-size:11px; color:var(--muted); margin-right:8px; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .det-img{margin-bottom:10px;}
  .img-frame{width:100%; border-radius:8px; border:1px solid var(--line); overflow:hidden;
    margin-bottom:6px; background:#0e1017;}
  .img-frame img{width:100%; height:100%; display:block; user-select:none; -webkit-user-drag:none;}
  .img-ctrls{display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap;}
  .mini-l{font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px; flex:1;}
  .mini-l input[type=range]{flex:1;}
  .btn.mini{padding:4px 9px; font-size:12px;}
  .pngchk{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted);
    margin-bottom:6px; cursor:pointer;}
  .det-img-btns{display:flex; gap:6px;}
  .det-img-btns .btn{flex:1; padding:6px; font-size:12px;}
  .wiki-view{font-size:13px; color:var(--text); line-height:1.55; background:var(--bg);
    border:1px solid var(--line); border-radius:6px; padding:8px 10px; margin-bottom:4px;
    min-height:20px; cursor:text; white-space:pre-wrap;}
  .wiki-view:hover{border-color:var(--accent);}
  .wiki-empty{color:var(--muted); font-style:italic;}
  .wlink{color:var(--accent); cursor:pointer; text-decoration:underline;}
  .wlink:hover{color:#fff;}
  .wlink.miss{color:var(--muted); text-decoration:none; border-bottom:1px dashed var(--muted); cursor:default;}
  .fhint{font-size:11px; color:var(--muted); margin:0 0 10px;}

  /* Modal */
  #modal{position:fixed; inset:0; background:rgba(0,0,0,.6); display:none;
    align-items:center; justify-content:center; z-index:100;}
  #modalBox{background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:22px; width:400px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,.6);}
  #modalBox h2{font-size:16px; color:#fff; margin-bottom:16px;}
  .chk-list{max-height:340px; overflow:auto; margin:4px 0 10px; border:1px solid var(--line); border-radius:8px;}
  .chk-row{display:flex; align-items:flex-start; gap:8px; padding:7px 10px; font-size:13px; border-bottom:1px solid var(--line); color:var(--text);}
  .chk-row:last-child{border-bottom:none;}
  .chk-row[data-jump]{cursor:pointer;}
  .chk-row[data-jump]:hover{background:var(--panel2);}
  .chk-dot{width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0;}
  .chk-row.warn .chk-dot{background:var(--red);}
  .chk-row.info .chk-dot{background:var(--muted);}
  .chk-msg{flex:1;}
  .chk-undo{flex-shrink:0; width:22px; height:22px; padding:0; margin-top:1px;
    border-radius:5px; background:transparent; border:1px solid var(--line); color:var(--muted);
    cursor:pointer; font-size:12px; line-height:1;}
  .chk-undo:hover{background:var(--red); border-color:var(--red); color:#fff;}
  .mrow{display:flex; gap:8px; justify-content:flex-end; margin-top:8px;}
  /* AI 점검 독 패널 */
  #chkDock{position:absolute; top:8px; right:8px; width:300px; max-height:calc(100% - 16px);
    background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.45); display:flex; flex-direction:column;
    z-index:40; overflow:hidden;}
  #chkDock.off{display:none;}
  #chkDockHead{display:flex; align-items:center; gap:4px; padding:8px 6px 8px 12px;
    border-bottom:1px solid var(--line); font-size:13px; font-weight:600; color:#fff;
    background:var(--panel); user-select:none;}
  #chkDockHead .cd-btn{width:26px; height:26px; border-radius:6px; background:transparent;
    border:1px solid transparent; color:var(--muted); cursor:pointer; font-size:14px;}
  #chkDockHead .cd-btn:hover{background:var(--line); color:#fff;}
  #chkDockBody{padding:8px 10px 10px; overflow:auto;}
  #chkDockBody .chk-sec{font-size:11px; font-weight:700; letter-spacing:.3px; color:var(--muted);
    text-transform:uppercase; margin:2px 0 5px;}
  #chkDockBody .chk-ok{color:var(--green); font-size:13px; margin:2px 0 4px;}
  #chkDockBody .chk-err{color:var(--red); font-size:13px; margin:2px 0 4px;}

<script>
/* ============ 데이터 모델 ============ */
const CATS = {
  place:   {label:"장소",   color:"#7aa2f7", icon:"📍"},
  person:  {label:"인물",   color:"#9ece6a", icon:"🧑"},
  faction: {label:"세력",   color:"#bb9af7", icon:"⚔️"},
  event:   {label:"사건",   color:"#f7768e", icon:"⚡"},
  item:    {label:"아이템", color:"#e0af68", icon:"💎"},
  concept: {label:"개념",   color:"#7dcfff", icon:"✦"},
};
const PLACE_TYPES = ["도시","마을","수도","성/요새","던전","성지","자연","지역"];

let W = blankWorld();
let sel = null;            // {id} — 상세 패널용 주 선택
let selSet = new Set();    // 다중 선택된 장소 id들
function isSel(id){ return selSet.has(id) || (sel&&sel.id===id); }
let tool = "pan";          // pan | place | brush | erase
let view = "map";
let cam = {x:0, y:0, z:1};  // camera pan/zoom
let brushColor = "#4a7c3f";
let brushSize = 40;
let drawPoly = null;   // 영역 그리는 중인 꼭짓점 배열
let previewPt = null;  // 커서 미리보기 점
let measureLine = null; // 거리 측정선 {a,b}
let holeTarget = null;  // 구멍을 추가할 영역 id
let simplifyStrength = 6; // 그리기 단순화 강도 (0=끔, px@현재배율)

/* 장소의 대표 좌표: 점이면 그 자리, 면이면 무게중심 */
function placeAnchor(p){
  if(p.shape==="area" && p.points && p.points.length){
    let x=0,y=0; p.points.forEach(pt=>{x+=pt.x;y+=pt.y;});
    return {x:x/p.points.length, y:y/p.points.length};
  }
  return {x:p.x, y:p.y};
}
/* 계층: 자식 목록 / 특정 항목이 다른 항목의 자손인지 */
/* 트리에서의 부모: 명시적 parent 우선, 없으면 장소는 '자신이 속한 하위 지도를 소유한 지역' */
function treeParent(i){
  if(i.parent) return i.parent;
  if(i.cat==="place" && i.mapId){
    const m=W.maps.find(x=>x.id===i.mapId);
    if(m && m.parent) return m.parent;
  }
  return null;
}
function childrenOf(id){ return allItems().filter(i=>treeParent(i)===id); }
/* 백링크: 이 항목의 이름을 설명에서 {{이름}}으로 언급한 다른 항목들 */
function backlinksOf(id){
  const it=findItem(id); if(!it) return [];
  const name=(it.ref.name||"").trim().toLowerCase(); if(!name) return [];
  return allItems().filter(o=>{
    if(o.id===id) return false;
    const d=(findItem(o.id).ref.desc||""); let m; const re=/\{\{([^}]+)\}\}/g;
    while((m=re.exec(d))){ if(m[1].trim().toLowerCase()===name) return true; }
    return false;
  });
}
function toggleLock(id,on){ const it=findItem(id); if(!it) return;
  if(on) it.ref.locked=true; else delete it.ref.locked;
  renderLeft(); renderDetail(); renderPins(); markDirty(); }

/* ===== 지오메트리 / 영역 소속 / 지도 간 가시성 ===== */
function pointInPoly(x,y,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;
    if(((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function polyArea(poly){
  let a=0; for(let i=0,j=poly.length-1;i<poly.length;j=i++){ a+=(poly[j].x+poly[i].x)*(poly[j].y-poly[i].y); }
  return Math.abs(a/2);
}
/* p를 포함하는 '직접 상위' 면 영역 후보들.
   - 점: 점이 폴리곤 내부 / 면: 모든 꼭짓점이 폴리곤 내부(완전 포함)
   - 다른 후보를 완전히 감싸는 바깥 후보는 제외해 가장 안쪽만 남김
   - 겹쳐서 여러 개면 이름이 빠른(가나다/사전) 순으로 정렬해 첫 번째가 부모 */
function containingAreasOf(p){
  const banned=new Set([p.id, ...descendantsOfArea(p.id).map(x=>x.id)]);
  const isArea = p.shape==="area" && p.points && p.points.length>=3;
  const c = placeAnchor(p);
  const inside = a => isArea
    ? p.points.every(pt=>inArea(pt.x,pt.y,a))
    : inArea(c.x,c.y,a);
  const cands = W.places.filter(a=> a.shape==="area" && a.points && a.points.length>=3
      && a.mapId===p.mapId && !banned.has(a.id) && inside(a));
  const minimal = cands.filter(a=> !cands.some(o=> o.id!==a.id && o.points.every(pt=>pointInPoly(pt.x,pt.y,a.points))));
  minimal.sort((x,y)=>(x.name||"").localeCompare(y.name||"","ko"));
  return minimal;
}
/* 자동 소속: 수동 지정(parentManual)이 아니면, 포함하는 영역을 parent로 */
function autoAssignArea(p){
  if(p.parentManual) return;
  if(p.shape==="line" || p.shape==="label") return;   // 선·라벨은 소속 자동판정 제외
  let a = containingAreasOf(p)[0] || null;
  if(!a){                     // 하위 지도에서 만든 경우, 그 지도가 속한 영역을 부모로
    const m=W.maps.find(x=>x.id===p.mapId);
    if(m && m.parent){ const par=W.places.find(x=>x.id===m.parent); if(par) a=par; }
  }
  const np = a ? a.id : undefined;
  if(np!==p.parent){ p.parent=np; delete p.hideOn; }   // 소속이 바뀌면 지도별 표시 초기화
}
function areaOf(p){                       // parent 중 '면 영역'인 것
  if(!p||!p.parent) return null;
  const par=W.places.find(x=>x.id===p.parent);
  return (par && par.shape==="area") ? par : null;
}
function submapOf(areaId){ const m=W.maps.find(x=>x.parent===areaId); return m?m.id:null; }
/* 영역의 모든 하위 장소(하위의 하위 포함) */
function descendantsOfArea(areaId){
  if(!areaId) return [];
  const out=[], seen=new Set();
  const rec=id=>{ W.places.forEach(p=>{ if(p.parent===id && !seen.has(p.id)){ seen.add(p.id); out.push(p); rec(p.id); } }); };
  rec(areaId); return out;
}
/* 장소 p가 지도 M에 나타날 수 있는가(기본): 자기 홈 지도 + (소속 영역의 홈 지도·하위 지도) + (영역은 자기 하위 지도) */
function baseVisible(p,M){
  if(p.mapId===M) return true;
  const A=areaOf(p);
  if(A && (A.mapId===M || submapOf(A.id)===M)) return true;
  if(p.shape==="area" && submapOf(p.id)===M) return true;
  return false;
}
/* 실제 표시 = 기본 가시 AND 해당 지도에서 숨김(hideOn) 처리 안 됨.
   단, 모든 적용 지도에서 숨겨져 완전히 사라지는 상황이면 숨김을 무시(안전장치) */
function visibleOnMap(p,M){
  if(!baseVisible(p,M)) return false;
  if(p.hideOn && p.hideOn.includes(M)){
    const appl=applicableMaps(p);
    if(appl.some(id=>!p.hideOn.includes(id))) return false;  // 다른 지도에서 보이면 여기선 숨김
    return true;                                             // 전부 숨김이면 숨김 무시(완전 비표시 방지)
  }
  return true;
}
/* 이 장소가 나타날 수 있는 지도 id 목록 */
function applicableMaps(p){ return W.maps.filter(m=>baseVisible(p,m.id)).map(m=>m.id); }
function toggleShowOn(id,mapId,show){
  const it=findItem(id); if(!it) return;
  const p=it.ref; p.hideOn=p.hideOn||[];
  if(show) p.hideOn=p.hideOn.filter(x=>x!==mapId);
  else if(!p.hideOn.includes(mapId)) p.hideOn.push(mapId);
  if(p.hideOn.length===0) delete p.hideOn;
  renderDetail(); renderPins(); markDirty();
}
/* 미러(다른 지도에서 온) 표시인지 = 홈 지도가 현재 지도가 아님 */
function isMirror(p){ return p.mapId!==W.currentMap; }
function isDescendant(id, ancestorId){
  let cur=findItem(id); const seen=new Set();
  while(cur && cur.ref.parent){
    if(cur.ref.parent===ancestorId) return true;
    if(seen.has(cur.ref.parent)) break; seen.add(cur.ref.parent);
    cur=findItem(cur.ref.parent);
  }
  return false;
}
function setParent(childId,parentId){
  const it=findItem(childId); if(!it) return;
  it.ref.parent = parentId || undefined;
  it.ref.parentManual = true;        // 수동 지정 → 자동 감지 잠금
  delete it.ref.hideOn;              // 소속 변경 시 지도별 표시 초기화
  renderLeft(); renderDetail(); renderPins(); markDirty();
}
function clearParentManual(id){       // 다시 자동 감지로
  const it=findItem(id); if(!it) return;
  delete it.ref.parentManual; autoAssignArea(it.ref);
  renderLeft(); renderDetail(); renderPins(); markDirty();
}

function blankMap(name,parent){
  return {id:uid(), name:name||t("메인 지도"), parent:parent||null,
    bg:{type:"color",value:"#161821"}, terrain:null, showGrid:true, mapW:4000, mapH:3000};
}
function blankWorld(){
  const m=blankMap();
  return {meta:{title:t("이름 없는 세계")}, maps:[m], currentMap:m.id, places:[], entities:[], events:[], links:[], graphPos:{}};
}
function curMap(){ return W.maps.find(m=>m.id===W.currentMap) || W.maps[0]; }
/* 구버전(단일 W.map) → 다중 지도 구조로 이관 + 무결성 보정 */
function migrateMaps(){
  if(!Array.isArray(W.maps) || W.maps.length===0){
    const m = (W.map && typeof W.map==="object") ? W.map : blankMap();
    m.id=m.id||uid(); m.name=m.name||"메인 지도"; m.parent=m.parent||null;
    if(!m.bg) m.bg={type:"color",value:"#161821"};
    if(!("showGrid" in m)) m.showGrid=true;
    W.maps=[m]; W.currentMap=m.id;
  }
  if(!W.currentMap || !W.maps.find(m=>m.id===W.currentMap)) W.currentMap=W.maps[0].id;
  const first=W.maps[0].id;
  W.places.forEach(p=>{ if(!p.mapId) p.mapId=first; });
  W.maps.forEach(m=>{ if(!m.mapW) m.mapW=4000; if(!m.mapH) m.mapH=3000; });   // 지도 크기 조절 기능(구버전 파일 보정)
  delete W.map;
  ensureSubMaps();     // 모든 면 영역에 하위 지도 보장
  // 영역-하위지도 이름 동기화(기존 파일 정규화)
  W.maps.forEach(m=>{ if(m.parent){ const a=W.places.find(p=>p.id===m.parent); if(a) m.name=a.name||"영역"; } });
}
function uid(){ return Math.random().toString(36).slice(2,9); }

/* places 는 지도 좌표(x,y)+placeType 를 가진 엔티티. entities 는 그 외.
   events 는 when(시점)을 가진 엔티티. 통일 접근을 위해 헬퍼 사용 */
function allItems(){
  return [
    ...W.places.map(p=>({...p, kind:"place", cat:"place"})),
    ...W.entities.map(e=>({...e, kind:"entity"})),
    ...W.events.map(e=>({...e, kind:"event", cat:"event"})),
  ];
}
function findItem(id){
  let p=W.places.find(x=>x.id===id); if(p) return {ref:p,kind:"place",cat:"place"};
  let e=W.entities.find(x=>x.id===id); if(e) return {ref:e,kind:"entity",cat:e.cat};
  let v=W.events.find(x=>x.id===id); if(v) return {ref:v,kind:"event",cat:"event"};
  return null;
}
function itemName(id){ const i=findItem(id); return i?i.ref.name:"?"; }
function itemCat(id){ const i=findItem(id); return i?i.cat:"concept"; }

/* ============ 좌측 목록 ============ */
let collapsedCats=new Set();   // 접힌 카테고리 key
let expandedNodes=new Set();   // 펼쳐진 트리 노드 id (기본은 접힘)
function toggleCat(key){ collapsedCats.has(key)?collapsedCats.delete(key):collapsedCats.add(key); renderLeft(); }
function toggleNode(id){ expandedNodes.has(id)?expandedNodes.delete(id):expandedNodes.add(id); renderLeft(); }
function treeParentId(id){ const it=findItem(id); return it?treeParent({...it.ref,cat:it.cat}):null; }
function expandAncestors(id){ let cur=treeParentId(id),g=0; while(cur&&g++<60){ expandedNodes.add(cur); cur=treeParentId(cur); } }

function renderLeft(){
  const q = document.getElementById("search").value.trim().toLowerCase();
  const box = document.getElementById("catList");
  const en = curLang()==="en";
  box.innerHTML = "";
  for(const [key,meta] of Object.entries(CATS)){
    let items = allItems().filter(i=>i.cat===key);
    if(q) items = items.filter(i=>(i.name||"").toLowerCase().includes(q)
        || (i.tags||[]).join(" ").toLowerCase().includes(q));
    const collapsed = collapsedCats.has(key);
    const g = document.createElement("div"); g.className="cat-group";
    g.innerHTML = `<div class="cat-title" onclick="toggleCat('${key}')">
      <span><span class="cat-tw">${collapsed?"▶":"▼"}</span> ${meta.icon} ${t(meta.label)} (${items.length})</span>
      <button class="cat-add" title="${en?`Add ${t(meta.label)}`:`${meta.label} 추가`}" onclick="event.stopPropagation();addItem('${key}')">＋</button></div>`;
    if(!collapsed){
      if(q){
        items.forEach(i=>appendItemRow(g,i,0,false,false));   // 검색 중엔 평면
      } else {
        const roots=items.filter(i=>{ const p=treeParent(i); return !p || !items.some(x=>x.id===p); });
        const seen=new Set();
        const renderNode=(node,depth)=>{
          if(seen.has(node.id)) return; seen.add(node.id);
          const kids=items.filter(c=>treeParent(c)===node.id);
          const expanded=expandedNodes.has(node.id);
          appendItemRow(g,node,depth,kids.length>0,expanded);
          if(kids.length && expanded) kids.forEach(c=>renderNode(c,depth+1));
        };
        roots.forEach(rt=>renderNode(rt,0));
      }
    }
    box.appendChild(g);
  }
}
function appendItemRow(g,i,depth,hasKids,expanded){
  const meta=CATS[i.cat];
  const el=document.createElement("div");
  el.className="item"+(isSel(i.id)?" sel":"");
  el.style.paddingLeft=(6+depth*14)+"px";
  const tog = hasKids
    ? `<span class="tw" onclick="event.stopPropagation();toggleNode('${i.id}')">${expanded?"▼":"▶"}</span>`
    : `<span class="tw-empty"></span>`;
  const mark = (i.shape==="area" ? " ▱" : i.shape==="line" ? " 〰" : i.shape==="label" ? " T" : "")+(i.locked?" 🔒":"");
  el.innerHTML=`${tog}<span class="dot" style="background:${meta.color}"></span><span class="nm">${esc(i.name||t("(이름없음)"))}${mark}</span>`;
  el.onclick=()=>selectItem(i.id);
  g.appendChild(el);
}

/* ============ 항목 생성/선택 ============ */
function addItem(cat){
  const id=uid();
  if(cat==="place"){
    // 화면 중앙 좌표에 배치
    const cx=(-cam.x + document.getElementById("center").clientWidth/2)/cam.z;
    const cy=(-cam.y + document.getElementById("center").clientHeight/2)/cam.z;
    const en=curLang()==="en";
    const place={id,name:en?"New Place":"새 장소",placeType:"도시",x:cx,y:cy,desc:"",tags:[],mapId:W.currentMap};
    W.places.push(place); autoAssignArea(place);
    switchView("map");
  } else if(cat==="event"){
    W.events.push({id,name:curLang()==="en"?"New Event":"새 사건",cat:"event",when:"",desc:"",tags:[]});
  } else {
    W.entities.push({id,name:(curLang()==="en"?"New ":"새 ")+t(CATS[cat].label),cat,desc:"",tags:[]});
  }
  selectItem(id);
  renderAll();
}
function selectItem(id, additive){
  if(additive){
    if(selSet.has(id)) selSet.delete(id); else selSet.add(id);
    const arr=[...selSet];
    sel = arr.length ? {id: (selSet.has(id)? id : arr[arr.length-1])} : null;
  } else {
    selSet=new Set([id]); sel={id};
  }
  if(sel) expandAncestors(sel.id);   // 선택한 항목이 트리에서 보이도록 상위 펼침
  renderLeft(); renderDetail(); renderPins(); if(view!=="map") renderView();
}
function clearSelection(){ sel=null; selSet.clear(); renderLeft(); renderDetail(); renderPins(); if(view!=="map") renderView(); }

/* ============ 지도 핀 ============ */
function renderPins(){
  const box=document.getElementById("pins"); box.innerHTML="";

/* 닫힌 부드러운 곡선 경로 (Catmull-Rom → 3차 베지어) */
function smoothClosedPath(p){
  const n=p.length; if(n<3) return polyPathD(p,true);
  let d=`M ${p[0].x} ${p[0].y} `;
  for(let i=0;i<n;i++){
    const p0=p[(i-1+n)%n], p1=p[i], p2=p[(i+1)%n], p3=p[(i+2)%n];
    const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
    const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
    d+=`C ${c1x} ${c1y} ${c2x} ${c2y} ${p2.x} ${p2.y} `;
  }
  return d+"Z";
}
/* 열린 부드러운 곡선 (그리는 중 미리보기용) */
function smoothOpenPath(p){
  const n=p.length; if(n<3) return "M "+p.map(pt=>`${pt.x} ${pt.y}`).join(" L ");
  let d=`M ${p[0].x} ${p[0].y} `;
  for(let i=0;i<n-1;i++){
    const p0=p[Math.max(i-1,0)], p1=p[i], p2=p[i+1], p3=p[Math.min(i+2,n-1)];
    const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
    const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
    d+=`C ${c1x} ${c1y} ${c2x} ${c2y} ${p2.x} ${p2.y} `;
  }
  return d;
}
function polyPathD(pts,close){ return "M "+pts.map(pt=>`${pt.x} ${pt.y}`).join(" L ")+(close?" Z":""); }
/* 점-선분 거리 */
function segDist(p,a,b){ const dx=b.x-a.x, dy=b.y-a.y;
  if(dx===0&&dy===0) return Math.hypot(p.x-a.x,p.y-a.y);
  let t=((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy); t=Math.max(0,Math.min(1,t));
  return Math.hypot(p.x-(a.x+t*dx), p.y-(a.y+t*dy)); }
/* Douglas–Peucker 단순화: 모양을 유지하며 꼭짓점 수를 줄임 */
function simplifyPoly(pts, tol){
  if(!pts || pts.length<3) return (pts||[]).slice();
  const keep=new Array(pts.length).fill(false);
  keep[0]=keep[pts.length-1]=true;
  const stack=[[0,pts.length-1]];
  while(stack.length){ const [s,e]=stack.pop(); let maxD=0, idx=-1;
    for(let i=s+1;i<e;i++){ const d=segDist(pts[i],pts[s],pts[e]); if(d>maxD){ maxD=d; idx=i; } }
    if(maxD>tol && idx>0){ keep[idx]=true; stack.push([s,idx]); stack.push([idx,e]); } }
  return pts.filter((_,i)=>keep[i]);
}
function ringPath(pts,curve){ return curve ? smoothClosedPath(pts) : polyPathD(pts,true); }
function areaPathD(p){
  let d = ringPath(p.points, p.curve);
  if(p.holes) p.holes.forEach(h=>{ if(h && h.length>=3) d+=" "+ringPath(h, p.curve); });
  return d;   // fill-rule:evenodd 로 구멍이 도려내짐
}
/* 점이 영역 내부인가 (구멍 안이면 제외) */
function inArea(x,y,a){
  if(!pointInPoly(x,y,a.points)) return false;
  if(a.holes) for(const h of a.holes){ if(h && h.length>=3 && pointInPoly(x,y,h)) return false; }
  return true;
}

function renderAreas(){
  const svg=document.getElementById("areas"); let s="";
  W.places.forEach(p=>{
    if(!visibleOnMap(p,W.currentMap)) return;   // 현재 지도(및 미러)에 보이는 것만
    if(!p.points || p.points.length<2) return;
    const col=p.color||"#7aa2f7";
    const on=isSel(p.id);
    if(p.shape==="line"){
      const d = p.curve ? smoothOpenPath(p.points) : polyPathD(p.points,false);
      s+=`<path data-id="${p.id}" d="${d}" fill="none" stroke="${col}" stroke-width="${(p.width||3)+(on?2:0)}"
        stroke-linecap="round" stroke-linejoin="round" ${on?'stroke-dasharray="1 0"':''} opacity="${on?1:0.9}"/>`;
      return;
    }
    if(p.shape!=="area") return;
    s+=`<path data-id="${p.id}" d="${areaPathD(p)}" fill="${col}" fill-opacity="${on?0.40:0.22}" fill-rule="evenodd"
      stroke="${col}" stroke-width="${on?4:2.5}" stroke-linejoin="round"/>`;
    const c=placeAnchor(p);
    s+=`<text class="area-label" x="${c.x}" y="${c.y}">${esc(p.name||"지역")}</text>`;
  });
  // 그리는 중 미리보기 (곡선)
  if(drawPoly && drawPoly.length){
    const d=smoothOpenPath(drawPoly.concat(previewPt?[previewPt]:[]));
    s+=`<path d="${d}" fill="rgba(122,162,247,0.15)" stroke="#7aa2f7" stroke-width="3" stroke-dasharray="9 6"/>`;
  }
  // 선택된 영역·선의 꼭짓점 편집 핸들 (단일 선택, pan, 미러 아님)
  const editP = (tool==="pan" && sel && selSet.size<=1) ? W.places.find(x=>x.id===sel.id) : null;
  if(editP && (editP.shape==="area"||editP.shape==="line") && editP.points && !isMirror(editP) && !editP.locked && visibleOnMap(editP,W.currentMap)){
    const hr=7/cam.z, mr=5/cam.z, sw=2/cam.z;
    const ringH=(ring,closed,hole)=>{ const n=ring.length, segs=closed?n:n-1; let out="";
      for(let i=0;i<segs;i++){ const a=ring[i], b=ring[(i+1)%n];
        out+=`<circle class="vh mid" data-id="${editP.id}" data-hole="${hole}" data-mi="${i}" cx="${(a.x+b.x)/2}" cy="${(a.y+b.y)/2}" r="${mr}" stroke-width="${sw}"/>`; }
      ring.forEach((pt,i)=>{ out+=`<circle class="vh${hole>=0?' hole':''}" data-id="${editP.id}" data-hole="${hole}" data-i="${i}" cx="${pt.x}" cy="${pt.y}" r="${hr}" stroke-width="${sw}"/>`; });
      return out; };
    s+=ringH(editP.points, editP.shape==="area", -1);
    if(editP.holes) editP.holes.forEach((h,hi)=>{ if(h && h.length>=2) s+=ringH(h,true,hi); });
  }
  svg.innerHTML=s;
  // 면·선 드래그 이동 핸들러
  svg.querySelectorAll("path[data-id]").forEach(el=>{
    const p=W.places.find(x=>x.id===el.getAttribute("data-id"));
    if(p) enableDrag(el,p);
  });
  // 꼭짓점 편집 핸들러 (외곽 링 hole=-1, 구멍 링 hole>=0)
  svg.querySelectorAll("circle.vh").forEach(h=>{
    const pl=W.places.find(x=>x.id===h.dataset.id); if(!pl) return;
    const hole=+h.dataset.hole;
    const ringOf=()=> hole<0 ? pl.points : (pl.holes && pl.holes[hole]);
    if(h.classList.contains("mid")){
      h.addEventListener("pointerdown",e=>{ e.stopPropagation();
        const ring=ringOf(); if(!ring) return; const i=+h.dataset.mi, a=ring[i], b=ring[(i+1)%ring.length];
        ring.splice(i+1,0,{x:(a.x+b.x)/2,y:(a.y+b.y)/2});
        if(hole<0) autoAssignArea(pl); renderPins(); markDirty(); });
    } else {
      const i=+h.dataset.i;
      h.addEventListener("pointerdown",e=>{ e.stopPropagation();
        const ring=ringOf(); if(!ring) return; const ox=ring[i].x, oy=ring[i].y, sx=e.clientX, sy=e.clientY; let moved=false;
        const mv=ev=>{ const dx=(ev.clientX-sx)/cam.z,dy=(ev.clientY-sy)/cam.z; if(Math.abs(dx)+Math.abs(dy)>1)moved=true;
          ring[i]={x:ox+dx,y:oy+dy}; renderPins(); };
        const up=()=>{ window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up);
          if(moved){ if(hole<0) autoAssignArea(pl); markDirty(); } };
        window.addEventListener("pointermove",mv); window.addEventListener("pointerup",up); });
      h.addEventListener("dblclick",e=>{ e.stopPropagation();
        const ring=ringOf(); if(!ring) return;
        if(hole>=0 && ring.length<=3){ pl.holes.splice(hole,1); if(!pl.holes.length) delete pl.holes; renderPins(); markDirty(); return; }
        const min = pl.shape==="line"?2:3;
        if(ring.length>min){ ring.splice(i,1); if(hole<0) autoAssignArea(pl); renderPins(); markDirty(); } });
    }
  });
}
function placeIcon(t){
  const m={"도시":"🏙️","마을":"🏘️","수도":"👑","성/요새":"🏰","던전":"🗝️","성지":"⛩️","자연":"🏔️","지역":"🗺️"};
  return m[t]||"📍";
}
/* 이동 대상: 선택된 장소들 + (영역이면 그 자손들), 미러 영역은 제외 */
function collectMoveTargets(){
  const ids=new Set();
  selSet.forEach(id=>{ ids.add(id); const p=W.places.find(x=>x.id===id);
    if(p && p.shape==="area") descendantsOfArea(id).forEach(k=>ids.add(k.id)); });
  return [...ids].map(id=>W.places.find(p=>p.id===id))
    .filter(p=>p && !p.locked && !(p.shape==="area" && isMirror(p)));
}
/* 핀·라벨·영역·선 공용 드래그 (Ctrl/Shift 클릭 다중선택, 다중 이동 지원) */
function enableDrag(el,p){
  el.addEventListener("pointerdown",e=>{
    if(tool!=="pan") return;
    e.stopPropagation();
    const additive = e.ctrlKey||e.metaKey||e.shiftKey;
    if(isMirror(p) && p.shape==="area"){ selectItem(p.id, additive); return; }  // 미러 영역 잠금
    if(p.locked){ selectItem(p.id, additive); return; }                          // 잠긴 항목은 선택만
    if(!additive && !selSet.has(p.id)){ selSet=new Set([p.id]); sel={id:p.id}; renderPins(); }
    const multi = selSet.has(p.id) && selSet.size>1;
    let targets = multi ? collectMoveTargets()
      : (p.shape==="area" ? [p, ...descendantsOfArea(p.id)] : [p]);
    const orig=targets.map(t=>({p:t, pts:t.points?t.points.map(q=>({x:q.x,y:q.y})):null, x:t.x, y:t.y,
      holes: t.holes? t.holes.map(h=>h.map(q=>({x:q.x,y:q.y}))) : null}));
    let moved=false, sx=e.clientX, sy=e.clientY;
    const mv=ev=>{
      const dx=(ev.clientX-sx)/cam.z, dy=(ev.clientY-sy)/cam.z;
      if(Math.abs(dx)+Math.abs(dy)>3) moved=true;
      orig.forEach(o=>{ if(o.pts){ o.p.points=o.pts.map(q=>({x:q.x+dx,y:q.y+dy}));
          if(o.holes) o.p.holes=o.holes.map(h=>h.map(q=>({x:q.x+dx,y:q.y+dy}))); }
        else { o.p.x=o.x+dx; o.p.y=o.y+dy; } });
      renderPins();
    };
    const up=()=>{ window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up);
      if(!moved) selectItem(p.id, additive);
      else { targets.forEach(t=>autoAssignArea(t)); markDirty(); } };
    window.addEventListener("pointermove",mv); window.addEventListener("pointerup",up);
  });
}
/* 선택된 항목과 연결된 장소들 사이 선 그리기 */
function renderEdges(){
  const svg=document.getElementById("edges"); svg.innerHTML="";
  const draw=(a,b,color)=>{
    const l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",a.x);l.setAttribute("y1",a.y);l.setAttribute("x2",b.x);l.setAttribute("y2",b.y);
    l.setAttribute("stroke",color);l.setAttribute("stroke-width","2");l.setAttribute("stroke-dasharray","6 5");
    l.setAttribute("opacity","0.7"); svg.appendChild(l);
  };
  // 현재 지도에 있는 장소만 대상으로
  const onMap=id=>{ const p=W.places.find(x=>x.id===id); return (p&&visibleOnMap(p,W.currentMap))?p:null; };
  // 장소끼리의 링크는 항상 옅게
  W.links.forEach(k=>{
    const A=onMap(k.from), B=onMap(k.to);
    if(A&&B) draw(placeAnchor(A),placeAnchor(B),"#3b4160");
  });
  // 선택된 항목이 있으면 연결된 장소를 강조
  if(sel){
    const linkedPlaceIds = linksOf(sel.id).map(l=>l.other).filter(onMap);
    const selPlace = onMap(sel.id);
    if(selPlace){
      linkedPlaceIds.forEach(id=>{const B=onMap(id); if(B) draw(placeAnchor(selPlace),placeAnchor(B),"#7aa2f7");});
    } else if(linkedPlaceIds.length>1){
      // 비장소 항목: 연결된 장소들을 서로 잇기
      for(let i=0;i<linkedPlaceIds.length;i++)for(let j=i+1;j<linkedPlaceIds.length;j++){
        const A=onMap(linkedPlaceIds[i]),B=onMap(linkedPlaceIds[j]);
        if(A&&B) draw(placeAnchor(A),placeAnchor(B),"#bb9af7");
      }
    }
  }
}

/* ============ 링크(관계) ============
   링크 구조: {from, to, rel, relBack?}
   - relBack 없음 = 단일(단방향) 관계  (from --rel--> to)
   - relBack 있음 = 양방향 복합 관계    (from --rel--> to, to --relBack--> from)
*/
function linksOf(id){
  return W.links.map(l=>{
    if(l.from===id) return {other:l.to,   label:l.rel,               out:true,           raw:l};
    if(l.to===id)   return {other:l.from, label:(l.relBack||l.rel),  out:!!l.relBack,    raw:l};
    return null;
  }).filter(Boolean);
}
function addLink(fromId){
  const others=allItems().filter(i=>i.id!==fromId
    && !W.links.some(l=>(l.from===fromId&&l.to===i.id)||(l.to===fromId&&l.from===i.id)));
  if(others.length===0){ appAlert(t("연결할 다른 항목이 없습니다. 먼저 항목을 추가해 주세요.")); return; }
  const opts=others.map(i=>`<option value="${i.id}">${CATS[i.cat].icon} ${esc(i.name)}</option>`).join("");

  openModal(`<h2>${t("관계 연결")}</h2>
    <label class="fl">${t("연결할 항목")}</label>
    <select class="f" id="mTarget">${opts}</select>

    <label class="fl">${t("관계 방식")}</label>
    <select class="f" id="mMode" onchange="onModeChange()">
      <option value="single">${t("단일 관계 (한 방향)")}</option>
      <option value="dual">${t("양방향 복합 (방향마다 다르게)")}</option>
    </select>

    <label class="fl" id="lbl1">${en?`Relation (${fromName} → other)`:`관계 (${fromName} → 상대)`}</label>
    <input class="f" id="mRel" placeholder="${t("예: 증오, 출신, 소속, 발생지")}">

    <div id="backWrap" style="display:none">
      <label class="fl">${en?`Reverse (other → ${fromName})`:`반대 방향 (상대 → ${fromName})`}</label>
      <input class="f" id="mRelBack" placeholder="${t("예: 사랑, 보호, 추종")}">
    </div>

    <div class="mrow">
      <button class="btn" onclick="closeModal()">${t("취소")}</button>

function onModeChange(){
  const dual=document.getElementById("mMode").value==="dual";
  document.getElementById("backWrap").style.display=dual?"block":"none";
  document.getElementById("lbl1").textContent=dual?t("정방향 (이 항목 → 상대)"):t("관계 (한 방향)");
}
function confirmLink(fromId){
  const to=document.getElementById("mTarget").value;
  const rel=document.getElementById("mRel").value.trim()||(curLang()==="en"?"linked":"연결됨");

}

/* ============ 지도 카메라 & 도구 ============ */
const wrap=document.getElementById("mapWrap");
const canvas=document.getElementById("terrain");
const ctx=canvas.getContext("2d");
const baseCanvas=document.getElementById("terrainBase");
const baseCtx=baseCanvas.getContext("2d");

function applyCam(){
  document.getElementById("viewport").style.transform=`translate(${cam.x}px,${cam.y}px) scale(${cam.z})`;
  document.getElementById("zoomInfo").textContent=Math.round(cam.z*100)+"%";
  renderScaleBar();
}
/* 배율 표시(우하단) 클릭 → 화면 중심을 유지하며 기본 배율(설정값·기본 100%)로 복귀 */
function resetZoom(){
  const dz=appSettings().defZoom;
  const target=Math.max(0.2,Math.min(3,((typeof dz==="number"&&dz>0)?dz:100)/100));
  if(cam.z===target) return;
  const rect=wrap.getBoundingClientRect(), mx=rect.width/2, my=rect.height/2;
  const wx=(mx-cam.x)/cam.z, wy=(my-cam.y)/cam.z;
  cam.z=target; cam.x=mx-wx*cam.z; cam.y=my-wy*cam.z; applyCam();
}
function worldPt(e){
  const rect=wrap.getBoundingClientRect();
  return {x:(e.clientX-rect.left-cam.x)/cam.z, y:(e.clientY-rect.top-cam.y)/cam.z};
}

/* 도구 전환. opts.keepDraw:true 면 area/hole을 벗어나도 drawPoly 등을 지우지 않음
   (구멍 확정 전 옵션 모달을 띄우는 동안 그려둔 도형을 유지하기 위함) */
function setTool(t,opts){
  if(!(opts&&opts.keepDraw) && (tool==="area"||tool==="hole") && t!=="area" && t!=="hole") cancelArea();   // 그리다 다른 도구로 가면 취소
  if(t!=="measure"){ measureLine=null; renderMeasure(); }   // 측정 도구 벗어나면 측정선 지움
  tool=t;
  document.querySelectorAll(".tbtn[data-tool]").forEach(b=>b.classList.toggle("active",b.dataset.tool===t));
  document.getElementById("brushPanel").style.display=(t==="brush"||t==="erase")?"block":"none";
  document.getElementById("simplifyPanel").style.display=(t==="area"||t==="line"||t==="hole")?"block":"none";
  document.getElementById("areaControls").style.display=(t==="area")?"flex":"none";
  // pan 모드에서만 핀/폴리곤 선택 가능, 나머지 모드에선 맵이 클릭을 받도록
  document.getElementById("pins").style.pointerEvents=(t==="pan")?"auto":"none";
  document.getElementById("areas").classList.toggle("locked", t!=="pan");
  document.getElementById("mapResize").style.display=(t==="pan")?"block":"none";
  wrap.classList.toggle("placing",t==="place");
  wrap.style.cursor = t==="pan" ? "grab" : "crosshair";
}
document.querySelectorAll(".tbtn[data-tool]").forEach(b=>b.onclick=()=>setTool(b.dataset.tool));

/* 브러시 색/굵기 */
const SWATCHES=[["#2b5d8a","바다"],["#4a7c3f","육지"],["#2f5233","숲"],["#6b5b4a","산"],
  ["#c2a878","사막"],["#dfe7f0","설원"],["#b5341a","용암"],["#41506b","늪"]];
function buildSwatches(){
  const box=document.getElementById("swatches"); box.innerHTML="";
  SWATCHES.forEach(([c,name])=>{
    const d=document.createElement("div"); d.className="sw"+(c===brushColor?" sel":"");
    d.style.background=c; d.innerHTML=`<span>${t(name)}</span>`;
    d.onclick=()=>{ setBrushColor(c); document.getElementById("brushColor").value=c; if(tool==="erase")setTool("brush"); };
    box.appendChild(d);
  });
}
function setBrushColor(c){ brushColor=c;
  document.querySelectorAll(".sw").forEach(s=>s.classList.toggle("sel",rgbEq(s.style.background,c)));
}
function rgbEq(a,b){ return a.replace(/\s/g,"").toLowerCase()===hexToRgb(b); }
function hexToRgb(h){ const n=parseInt(h.slice(1),16); return `rgb(${(n>>16)&255},${(n>>8)&255},${n&255})`; }

/* 지형 그리기 */
function startDraw(e){
  const p=worldPt(e);
  ctx.globalCompositeOperation = tool==="erase" ? "destination-out" : "source-over";
  ctx.strokeStyle=brushColor; ctx.fillStyle=brushColor;
  ctx.lineWidth=brushSize; ctx.lineCap="round"; ctx.lineJoin="round";
  ctx.beginPath(); ctx.arc(p.x,p.y,brushSize/2,0,Math.PI*2); ctx.fill(); // 시작점 점 찍기
  let last=p;
  const mv=ev=>{ const q=worldPt(ev);
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(q.x,q.y); ctx.stroke(); last=q; };
  const up=()=>{ window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up); markDirty(); };
  window.addEventListener("pointermove",mv); window.addEventListener("pointerup",up);
}
function startPan(e){
  wrap.classList.add("grabbing");
  const sx=e.clientX,sy=e.clientY,ox=cam.x,oy=cam.y; let moved=false;
  const mv=ev=>{ if(Math.abs(ev.clientX-sx)+Math.abs(ev.clientY-sy)>3) moved=true;
    cam.x=ox+(ev.clientX-sx); cam.y=oy+(ev.clientY-sy); applyCam();};
  const up=()=>{wrap.classList.remove("grabbing"); window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up);
    if(!moved && (sel||selSet.size)) clearSelection(); };   // 빈 곳 클릭 시 선택 해제
  window.addEventListener("pointermove",mv); window.addEventListener("pointerup",up);
}
wrap.addEventListener("pointerdown",e=>{
  // 맵 위에 떠 있는 UI(툴바·패널·버튼 등) 클릭은 맵 조작으로 처리하지 않음
  if(e.target.closest("#mapToolbar,#mapBar,#brushPanel,#areaControls,#mapTools,#mapHint,#zoomInfo")) return;
  if(tool==="area"){ startAreaDraw(e); return; }
  if(tool==="hole"){ startHoleDraw(e); return; }
  if(tool==="line"){ startLineDraw(e); return; }
  if(tool==="label"){ placeLabel(e); return; }
  if(tool==="measure"){ startMeasure(e); return; }
  if(tool==="place"){ placeAt(e); return; }
  if(tool==="brush"||tool==="erase"){ startDraw(e); return; }

/* ============ 영역(면) 자유곡선 그리기 ============
   커서를 드래그하는 경로를 따라 점을 샘플링해 부드러운 곡선 영역을 만든다. */
function startAreaDraw(e){
  drawPoly=[worldPt(e)]; previewPt=null;
  const mv=ev=>{
    const p=worldPt(ev);
    const last=drawPoly[drawPoly.length-1];
    if(Math.hypot(p.x-last.x,p.y-last.y) > 9/cam.z){ drawPoly.push(p); renderAreas(); }
  };
  const up=()=>{
    window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up);
    finishFreeArea();
  };
  window.addEventListener("pointermove",mv); window.addEventListener("pointerup",up);
}
function finishFreeArea(){
  if(!drawPoly || drawPoly.length<3){ drawPoly=null; previewPt=null; renderAreas(); return; }
  const id=uid();
  const simp=(simplifyStrength>0?simplifyPoly(drawPoly, simplifyStrength/cam.z):drawPoly.slice());
  const area={id,name:(curLang()==="en"?"New Area":"새 지역"),placeType:"지역",shape:"area",curve:true,
    points:(simp.length>=3?simp:drawPoly.slice()),color:"#7aa2f7",x:0,y:0,desc:"",tags:[],mapId:W.currentMap};
  W.places.push(area); autoAssignArea(area);
  W.maps.push(blankMap(area.name||t("영역"), area.id));  // 하위 지도 자동 생성(이름 연동)
  drawPoly=null; previewPt=null;
  setTool("pan"); selectItem(id); renderMapBar(); renderAll();
}

/* 선/경로: 영역과 같은 자유곡선 드래그이나 열린 경로(shape:line) */

  const up=()=>{ window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up); finishFreeLine(); };

let pendingHole=null;   // 구멍 확정 모달이 떠 있는 동안 대상 영역id·좌표를 보관 {areaId, points}

/* 모달 선택 결과를 실제로 반영: 항상 구멍을 뚫고, makeArea면 같은 좌표로 새 면 영역도 추가 */
function commitHole(makeArea){

  if(!ph){ renderAll(); return; }

      const newArea={id,name:(curLang()==="en"?"New Area":"새 지역"),placeType:"지역",shape:"area",curve:a.curve,
        points:ph.points.map(q=>({x:q.x,y:q.y})),color:"#7aa2f7",x:0,y:0,desc:"",tags:[],mapId:a.mapId};
      W.places.push(newArea); autoAssignArea(newArea);
      W.maps.push(blankMap(newArea.name||t("영역"), newArea.id));  // 하위 지도 자동 생성(이름 연동)
      selectId=id;
    }
  }
  if(selectId) selectItem(selectId);
  renderMapBar(); renderAll();
}

wrap.addEventListener("wheel",e=>{

  cam.x=mx-wx*cam.z; cam.y=my-wy*cam.z; applyCam();
},{passive:false});

/* ============ 배경 & 지형 저장/복원 ============ */
function applyMap(){
  const bg=document.getElementById("mapbg");
  const m=curMap();
  const mw=(m&&m.mapW)||4000, mh=(m&&m.mapH)||3000;
  if(m.bg && m.bg.type==="image" && m.bg.value){

  renderResizeHandles();

function saveTerrain(){ try{ curMap().terrain=canvas.toDataURL("image/png"); }catch(e){} }
/* 상위 지도들(바깥→안쪽 순)의 지형 — 하위 지도의 밑그림으로 깔림 */
function ancestorMaps(m){
  const chain=[]; let cur=m, seen=new Set();
  while(cur && cur.parent){
    const pp=W.places.find(p=>p.id===cur.parent); if(!pp) break;
    const pm=W.maps.find(x=>x.id===pp.mapId); if(!pm||seen.has(pm.id)) break;
    seen.add(pm.id); chain.unshift(pm); cur=pm;
  }
  return chain;
}
let _terrainToken=0;
function drawLayer(c, srcs, tok){
  // 순서대로 이미지를 겹쳐 그림. 그리는 도중 지도가 다시 바뀌면(tok 불일치) 중단
  let i=0;
  const step=()=>{
    if(tok!==_terrainToken) return;
    while(i<srcs.length && !srcs[i]) i++;
    if(i>=srcs.length) return;
    const im=new Image(); im.onload=()=>{ if(tok===_terrainToken) c.drawImage(im,0,0); i++; step(); };
    im.onerror=()=>{ i++; step(); }; im.src=srcs[i];
  };
  step();
}
function syncTerrainCanvasSize(){
  // 지도를 전환할 때 캔버스 버퍼 크기를 현재 지도 크기에 맞춘다(내용은 어차피 loadTerrain이 다시 그림).
  const m=curMap();
  const mw=(m&&m.mapW)||4000, mh=(m&&m.mapH)||3000;
  [canvas,baseCanvas].forEach(el=>{
    if(el.width!==mw||el.height!==mh){ el.width=mw; el.height=mh; }
    el.style.width=mw+"px"; el.style.height=mh+"px";
  });
}
function loadTerrain(){
  syncTerrainCanvasSize();
  const tok=++_terrainToken;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  baseCtx.clearRect(0,0,baseCanvas.width,baseCanvas.height);
  const m=curMap();
  drawLayer(baseCtx, ancestorMaps(m).map(x=>x.terrain), tok);
  drawLayer(ctx, [m&&m.terrain], tok);
}
function toggleGrid(){ const m=curMap(); m.showGrid = !(m.showGrid!==false); applyMap(); markDirty(); }

/* ============ 지도 크기 조절(양 끝·모서리를 드래그) ============
   확대/축소(카메라 배율)와 별개로, 지도 배경·지형·격자가 차지하는 실제 캔버스 크기(mapW,mapH) 자체를 늘리거나 줄인다.
   반대쪽 변/모서리는 화면상 고정된 것처럼 보이도록, w(좌)/n(상) 방향 드래그 시 기존 장소·지형을 그만큼 밀어(shift) 원점(0,0)을 항상 유지한다. */
const RZ_MIN=200, RZ_MAX=10000, RZ_PAD=20;
const RZ_DIRS=["n","s","e","w","ne","nw","se","sw"];
function buildResizeHandles(){
  const box=document.getElementById("mapResize"); if(!box) return;
  RZ_DIRS.forEach(d=>{
    const el=document.createElement("div");
    el.className="rzh rzh-"+d; el.dataset.dir=d;
    el.title=t("드래그해서 지도 크기 조절");
    box.appendChild(el);
  });
}
function renderResizeHandles(){
  const box=document.getElementById("mapResize"); if(!box) return;
  const m=curMap(); const w=(m&&m.mapW)||4000, h=(m&&m.mapH)||3000;
  const P={n:[w/2,0], s:[w/2,h], e:[w,h/2], w:[0,h/2], ne:[w,0], nw:[0,0], se:[w,h], sw:[0,h]};
  box.querySelectorAll(".rzh").forEach(el=>{
    const p=P[el.dataset.dir]; el.style.left=p[0]+"px"; el.style.top=p[1]+"px";
  });
}
/* 현재 지도에 있는 장소·영역·선·라벨의 좌표 범위(점 하나만 있어도 포함) */
function mapContentBBox(mapId){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity, any=false;
  W.places.forEach(p=>{
    if(p.mapId!==mapId) return;
    const pts = (p.points&&p.points.length) ? p.points : [{x:p.x||0,y:p.y||0}];
    pts.forEach(pt=>{ any=true;
      if(pt.x<minX)minX=pt.x; if(pt.y<minY)minY=pt.y; if(pt.x>maxX)maxX=pt.x; if(pt.y>maxY)maxY=pt.y; });
  });
  return any ? {minX,minY,maxX,maxY} : null;
}
/* 현재 열려있는 지형 캔버스에서 실제로 칠해진(불투명) 영역의 범위(성능을 위해 표본 추출) */
function terrainOpaqueBBox(cnv){
  try{
    const w=cnv.width, h=cnv.height; if(!w||!h) return null;
    const step=Math.max(1, Math.round(Math.max(w,h)/500));
    const data=cnv.getContext("2d").getImageData(0,0,w,h).data;
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    for(let y=0;y<h;y+=step){
      for(let x=0;x<w;x+=step){
        if(data[(y*w+x)*4+3]>10){ if(x<minX)minX=x; if(y<minY)minY=y; if(x>maxX)maxX=x; if(y>maxY)maxY=y; }
      }
    }
    if(minX===Infinity) return null;
    return {minX,minY,maxX:Math.min(w,maxX+step),maxY:Math.min(h,maxY+step)};
  }catch(e){ return null; }
}
/* 축소를 제한할 기준 경계(장소+지형 합산). 아무 콘텐츠도 없으면 null(제한 없음) */
function mapClampBBox(m){
  const a=mapContentBBox(m.id);
  const b=terrainOpaqueBBox(canvas);
  if(!a && !b) return null;
  const xs=[],ys=[];
  if(a){ xs.push(a.minX,a.maxX); ys.push(a.minY,a.maxY); }
  if(b){ xs.push(b.minX,b.maxX); ys.push(b.minY,b.maxY); }
  return {minX:Math.min(...xs), minY:Math.min(...ys), maxX:Math.max(...xs), maxY:Math.max(...ys)};
}
/* 드래그 방향(dir)·이동량(dx,dy)으로부터 새 크기와, 원점 유지를 위한 콘텐츠 이동량(shiftX,shiftY) 계산 */
function computeResize(dir,startW,startH,dx,dy,bbox){
  let w=startW, h=startH, shiftX=0, shiftY=0;
  if(dir.includes("e")) w=startW+dx;
  if(dir.includes("w")) w=startW-dx;
  if(dir.includes("s")) h=startH+dy;
  if(dir.includes("n")) h=startH-dy;
  w=Math.min(RZ_MAX,Math.max(RZ_MIN,w));
  h=Math.min(RZ_MAX,Math.max(RZ_MIN,h));
  if(dir.includes("w")) shiftX=w-startW;
  if(dir.includes("n")) shiftY=h-startH;
  if(bbox){
    if(dir.includes("w") && bbox.minX+shiftX<RZ_PAD){ shiftX=RZ_PAD-bbox.minX; w=startW+shiftX; }
    if(dir.includes("e") && bbox.maxX>w-RZ_PAD){ w=bbox.maxX+RZ_PAD; }
    if(dir.includes("n") && bbox.minY+shiftY<RZ_PAD){ shiftY=RZ_PAD-bbox.minY; h=startH+shiftY; }
    if(dir.includes("s") && bbox.maxY>h-RZ_PAD){ h=bbox.maxY+RZ_PAD; }
    w=Math.min(RZ_MAX,Math.max(RZ_MIN,w));
    h=Math.min(RZ_MAX,Math.max(RZ_MIN,h));
    if(dir.includes("w")) shiftX=w-startW;
    if(dir.includes("n")) shiftY=h-startH;
  }
  return {w:Math.round(w), h:Math.round(h), shiftX:Math.round(shiftX), shiftY:Math.round(shiftY)};
}
/* 캔버스 버퍼 크기를 바꾸면서(=내용이 지워지므로) 기존 그림을 (dx,dy)만큼 옮겨 새 버퍼에 다시 그려 보존 */
function resizeCanvasWithShift(el, cctx, newW, newH, dx, dy){
  const tmp=document.createElement("canvas"); tmp.width=el.width; tmp.height=el.height;
  tmp.getContext("2d").drawImage(el,0,0);
  el.width=newW; el.height=newH; el.style.width=newW+"px"; el.style.height=newH+"px";
  cctx.clearRect(0,0,newW,newH);
  cctx.drawImage(tmp,dx,dy);
}
function commitMapResize(m,res){
  const oldW=m.mapW||4000, oldH=m.mapH||3000;
  const {w:newW,h:newH,shiftX,shiftY}=res;
  if(newW===oldW && newH===oldH) return;
  if(shiftX||shiftY){
    W.places.forEach(p=>{
      if(p.mapId!==m.id) return;
      if(p.points && p.points.length) p.points=p.points.map(q=>({x:q.x+shiftX,y:q.y+shiftY}));
      else { p.x=(p.x||0)+shiftX; p.y=(p.y||0)+shiftY; }
      if(p.holes) p.holes=p.holes.map(hole=>hole.map(q=>({x:q.x+shiftX,y:q.y+shiftY})));
    });
    cam.x-=shiftX*cam.z; cam.y-=shiftY*cam.z;
  }
  resizeCanvasWithShift(canvas,ctx,newW,newH,shiftX,shiftY);   // 이 지도의 지형(사용자가 직접 그린 것) 보존
  m.mapW=newW; m.mapH=newH;
  const tok=++_terrainToken;
  baseCanvas.width=newW; baseCanvas.height=newH;
  baseCanvas.style.width=newW+"px"; baseCanvas.style.height=newH+"px";
  baseCtx.clearRect(0,0,newW,newH);
  drawLayer(baseCtx, ancestorMaps(m).map(x=>x.terrain), tok);   // 상위 지도 밑그림은 파생 데이터라 다시 그리기만 하면 됨
  applyCam(); applyMap(); renderAll(); markDirty();
}
function enableMapResize(){
  document.querySelectorAll("#mapResize .rzh").forEach(el=>{
    el.addEventListener("pointerdown",e=>{
      if(tool!=="pan") return;
      e.stopPropagation(); e.preventDefault();
      const dir=el.dataset.dir, m=curMap();
      const startW=m.mapW||4000, startH=m.mapH||3000;
      const bbox=mapClampBBox(m);
      const sx=e.clientX, sy=e.clientY;
      const outline=document.getElementById("mapResizePreview");
      outline.style.display="block";
      const paint=(res)=>{
        outline.style.left=(-res.shiftX)+"px"; outline.style.top=(-res.shiftY)+"px";
        outline.style.width=res.w+"px"; outline.style.height=res.h+"px";
      };
      paint({w:startW,h:startH,shiftX:0,shiftY:0});
      let last=null;
      const mv=ev=>{
        const dx=(ev.clientX-sx)/cam.z, dy=(ev.clientY-sy)/cam.z;
        last=computeResize(dir,startW,startH,dx,dy,bbox);
        paint(last);
      };
      const up=()=>{
        window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up);
        outline.style.display="none";
        if(last) commitMapResize(m,last);
      };
      window.addEventListener("pointermove",mv); window.addEventListener("pointerup",up);
    });
  });
}

function openBgModal(){
  const cur=(curMap().bg&&curMap().bg.type==="color")?curMap().bg.value:"#161821";
  openModal(`<h2>${t("지도 배경 설정")}</h2>
    <label class="fl">${t("배경 이미지")}</label>
    <button class="btn" style="width:100%" onclick="pickBgImage()">${t("이미지 파일 선택…")}</button>

}
function pickBgImage(){

function clearBg(){ curMap().bg={type:"color",value:"#161821"}; applyMap(); closeModal(); markDirty(); }

/* ============ 축척 · 거리 측정 ============ */
function measureDist(a,b){ return Math.hypot(b.x-a.x,b.y-a.y); }
function fmtDist(px){ const s=W.meta.scale;
  return (s&&s.perPx) ? (px*s.perPx).toLocaleString(undefined,{maximumFractionDigits:1})+" "+(s.unit||"km")
                      : Math.round(px)+" px"; }
function startMeasure(e){
  measureLine={a:worldPt(e), b:worldPt(e)}; renderMeasure();
  const mv=ev=>{ measureLine.b=worldPt(ev); renderMeasure(); };
  const up=()=>{ window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up); };
  window.addEventListener("pointermove",mv); window.addEventListener("pointerup",up);
}
function renderMeasure(){
  const svg=document.getElementById("measure"); if(!svg) return;
  if(!measureLine){ svg.innerHTML=""; return; }
  const {a,b}=measureLine, mx=(a.x+b.x)/2, my=(a.y+b.y)/2, z=cam.z;
  svg.innerHTML=`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="#e0af68" stroke-width="${2/z}" stroke-dasharray="${7/z} ${4/z}"/>
    <circle cx="${a.x}" cy="${a.y}" r="${4/z}" fill="#e0af68"/><circle cx="${b.x}" cy="${b.y}" r="${4/z}" fill="#e0af68"/>
    <text x="${mx}" y="${my-9/z}" fill="#fff" font-size="${13/z}" text-anchor="middle" paint-order="stroke" stroke="#000" stroke-width="${3.5/z}">${esc(fmtDist(measureDist(a,b)))}</text>`;
}
function renderScaleBar(){
  const el=document.getElementById("scaleBar"); if(!el) return;
  const s=W.meta.scale;
  if(!s || !s.perPx){ el.style.display="none"; return; }
  const worldPx=110/cam.z, real=worldPx*s.perPx;
  const pow=Math.pow(10,Math.floor(Math.log10(real))), f=real/pow;
  const nice=(f>=5?5:f>=2?2:1)*pow;
  const screen=(nice/s.perPx)*cam.z;
  el.style.display="block";
  el.innerHTML=`<div class="sb-line" style="width:${screen}px"></div><span>${nice.toLocaleString()} ${esc(s.unit||"km")}</span>`;
}
function openScaleModal(){
  const s=W.meta.scale||{perPx:"",unit:"km"};
  const lastPx = measureLine? Math.round(measureDist(measureLine.a,measureLine.b)) : 0;
  const en=curLang()==="en";
  openModal(`<h2>${t("축척 설정")}</h2>
    <label class="fl">${t("1 픽셀당 거리 · 단위")}</label>
    <div style="display:flex;gap:6px">
      <input class="f" id="scPer" type="number" step="any" value="${s.perPx||""}" placeholder="${en?"e.g. 0.5":"예: 0.5"}" style="flex:1">
      <input class="f" id="scUnit" value="${esc(s.unit||"km")}" style="width:80px">
    </div>
    ${lastPx? `<p style="font-size:12px;color:var(--muted);margin:6px 0">${en?`Enter the real distance of the ${lastPx}px you just measured to auto-calibrate.`:`방금 측정한 ${lastPx}px의 실제 거리를 입력하면 자동 보정됩니다.`}</p>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
        <span style="font-size:12px;color:var(--muted);white-space:nowrap">${lastPx}px =</span>
        <input class="f" id="scReal" type="number" step="any" placeholder="${t("실제 거리")}" style="flex:1;margin:0">
        <button class="btn" onclick="calibScale(${lastPx})">${t("보정")}</button></div>`:""}
    <div class="mrow"><button class="btn" onclick="closeModal()">${t("취소")}</button>
      <button class="btn primary" onclick="saveScale()">${t("저장")}</button></div>`);
}
function calibScale(px){ const real=parseFloat(document.getElementById("scReal").value);
  if(real>0 && px>0) document.getElementById("scPer").value = real/px; }
function saveScale(){
  const per=parseFloat(document.getElementById("scPer").value);
  const unit=document.getElementById("scUnit").value.trim()||"km";
  if(per>0) W.meta.scale={perPx:per,unit}; else delete W.meta.scale;
  closeModal(); renderScaleBar(); renderDetail(); markDirty();
}

/* ============ 다중 지도 ============ */
function renderMapBar(){
  const bar=document.getElementById("mapBar"); if(!bar) return;
  const cur=curMap();
  let s="";
  const en=curLang()==="en";
  if(cur.parent){
    const pp=W.places.find(p=>p.id===cur.parent);
    if(pp){
      s+=`<span class="mapcrumb">${en?`in ${esc(pp.name)}`:`${esc(pp.name)} 안`}</span>`;
      s+=`<button class="btn mini" title="${t("상위 지도로")}" onclick="switchMap('${pp.mapId}')">${t("↑ 상위")}</button>`;
    }
  }
  const opts=W.maps.map(m=>`<option value="${m.id}" ${m.id===W.currentMap?"selected":""}>${esc(mapDepthMark(m)+m.name)}</option>`).join("");
  s+=`<select onchange="switchMap(this.value)">${opts}</select>`;
  s+=`<button class="btn mini" onclick="renameMap()">${t("이름")}</button>`;
  s+=`<button class="btn mini" onclick="addMainMap()">${t("＋ 새 지도")}</button>`;
  s+=`<button class="btn mini" title="${t("축척 설정")}" onclick="openScaleModal()">${t("축척")}</button>`;
  if(W.maps.length>1) s+=`<button class="btn mini" title="${t("현재 지도 삭제")}" onclick="deleteCurMap()">🗑</button>`;
  bar.innerHTML=s;
}
function mapDepthMark(m){
  let d=0, cur=m, seen=new Set();
  while(cur && cur.parent){
    const pp=W.places.find(p=>p.id===cur.parent); if(!pp) break;
    const pm=W.maps.find(x=>x.id===pp.mapId); if(!pm||seen.has(pm.id)) break;
    seen.add(pm.id); d++; cur=pm;
  }
  return "· ".repeat(d);
}
function switchMap(id){
  if(!id || id===W.currentMap) return;
  if(!W.maps.find(m=>m.id===id)) return;
  saveTerrain();                 // 현재 지도 지형 보존
  W.currentMap=id; cam={x:40,y:40,z:1};
  applyMap(); loadTerrain(); renderMapBar(); renderAll(); fitView(); markDirty();
}
function addMainMap(){
  saveTerrain();
  const n=W.maps.filter(m=>!m.parent).length+1;
  const m=blankMap(t("메인 지도")+" "+n, null);
  W.maps.push(m); W.currentMap=m.id; cam={x:40,y:40,z:1};
  applyMap(); loadTerrain(); renderMapBar(); renderAll(); markDirty();
}
function addSubMap(placeId){
  const place=W.places.find(p=>p.id===placeId); if(!place) return;
  saveTerrain();
  // 하위 지도는 부모 영역·그 하위 장소들을 좌표 연동으로 자동 미러링하므로 복제하지 않음
  let m=W.maps.find(x=>x.parent===placeId);
  if(!m){ m=blankMap(place.name||"영역", placeId); W.maps.push(m); }
  W.currentMap=m.id; cam={x:40,y:40,z:1};
  applyMap(); loadTerrain(); renderMapBar(); renderAll(); fitView(); markDirty();
}
/* 모든 면 영역에 하위 지도가 하나씩 있도록 보장 */
function ensureSubMaps(){
  W.places.forEach(p=>{
    if(p.shape==="area" && !W.maps.some(m=>m.parent===p.id)){
      W.maps.push(blankMap(p.name||"영역", p.id));
    }
  });
}
/* 부모 장소가 사라진 하위 지도(및 그 지도에만 있던 장소)를 정리 */
function cleanupOrphanMaps(){
  let changed=true;
  while(changed){
    changed=false;
    for(const m of W.maps.slice()){
      if(m.parent && !W.places.find(p=>p.id===m.parent)){
        W.places=W.places.filter(p=>p.mapId!==m.id);
        W.maps=W.maps.filter(x=>x.id!==m.id);
        changed=true;
      }
    }
  }
  if(!W.maps.find(m=>m.id===W.currentMap)) W.currentMap=(W.maps[0]||{}).id;
}
function renameMap(){
  const m=curMap(); const n=prompt(t("지도 이름"), m.name);
  if(n!==null){
    m.name=n.trim()||m.name;
    if(m.parent){ const a=W.places.find(p=>p.id===m.parent); if(a){ a.name=m.name; } }  // 영역 이름도 연동
    renderMapBar(); renderLeft(); renderDetail(); markDirty();
  }
}
function deleteCurMap(){
  if(W.maps.length<=1){ appAlert(t("지도가 하나뿐이라 삭제할 수 없습니다.")); return; }
  const m=curMap();
  appConfirm(curLang()==="en"?`Delete map '${m.name}'? Places and terrain on this map will also be deleted.`:`'${m.name}' 지도를 삭제하시겠습니까? 이 지도의 장소·지형도 함께 삭제됩니다.`, ()=>{
    W.places=W.places.filter(p=>p.mapId!==m.id);
    W.maps=W.maps.filter(x=>x.id!==m.id);
    // 이 지도를 부모로 삼던 하위 지도는 최상위로
    W.maps.forEach(x=>{ if(x.parent){ const pp=W.places.find(p=>p.id===x.parent); if(!pp) x.parent=null; } });
    W.currentMap=W.maps[0].id; cam={x:40,y:40,z:1};
    applyMap(); loadTerrain(); renderMapBar(); renderAll(); fitView(); markDirty();
  });
}
function focusPlace(id){
  const p=W.places.find(x=>x.id===id); if(!p) return;
  if(p.mapId!==W.currentMap){ switchMap(p.mapId); }
  const a=placeAnchor(p);
  switchView("map");
  cam.z=1.2;
  cam.x=document.getElementById("center").clientWidth/2 - a.x*cam.z;
  cam.y=document.getElementById("center").clientHeight/2 - a.y*cam.z;
  applyCam();
}
function fitView(){
  const here=W.places.filter(p=>visibleOnMap(p,W.currentMap));
  if(here.length===0){ cam={x:40,y:40,z:1}; applyCam(); return; }
  // 점은 좌표, 면은 모든 꼭짓점을 포함해 범위 계산
  const xs=[],ys=[];
  here.forEach(p=>{
    if(p.shape==="area" && p.points && p.points.length){ p.points.forEach(pt=>{xs.push(pt.x);ys.push(pt.y);}); }
    else { xs.push(p.x); ys.push(p.y); }
  });
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const cw=document.getElementById("center").clientWidth, ch=document.getElementById("center").clientHeight;
  const w=Math.max(maxX-minX,200),h=Math.max(maxY-minY,200);
  cam.z=Math.min(2,Math.max(.3,Math.min((cw-160)/w,(ch-160)/h)));
  cam.x=cw/2-((minX+maxX)/2)*cam.z; cam.y=ch/2-((minY+maxY)/2)*cam.z; applyCam();
}

/* ============ 뷰 전환 ============ */
function switchView(v){

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>switchView(t.dataset.view));

}

/* --- 관계도(그래프) 필터 --- */
let graphCats=new Set(Object.keys(CATS));   // 표시할 분류
let graphTags=new Set();                     // 선택된 태그(비어있으면 전체)
function toggleGraphCat(k){ graphCats.has(k)?graphCats.delete(k):graphCats.add(k); renderGraph(); }
function toggleGraphTag(t){ graphTags.has(t)?graphTags.delete(t):graphTags.add(t); renderGraph(); }
function clearGraphTags(){ graphTags.clear(); renderGraph(); }
function resetGraphFilter(){ graphCats=new Set(Object.keys(CATS)); graphTags.clear(); renderGraph(); }
function graphVisible(n){
  return graphCats.has(n.cat) && (graphTags.size===0 || (n.tags||[]).some(t=>graphTags.has(t)));
}
function renderGraphFilter(){
  const box=document.getElementById("graphFilter");
  let s=`<div class="gf-row"><span class="gf-lbl">${t("분류")}</span>`;
  for(const [key,meta] of Object.entries(CATS)){
    const on=graphCats.has(key);
    const st=on?`background:${meta.color};border-color:${meta.color};color:#0b0e18;font-weight:600`:"";
    s+=`<button class="gf-chip${on?' on':''}" style="${st}" data-cat="${key}">${meta.icon} ${t(meta.label)}</button>`;
  }
  s+=`</div>`;
  const tags=[...new Set(allItems().flatMap(i=>i.tags||[]))].sort();
  if(tags.length){
    s+=`<div class="gf-row"><span class="gf-lbl">${t("태그")}</span>`;
    tags.forEach((tg,idx)=>{ const on=graphTags.has(tg);
      s+=`<button class="gf-chip${on?' on':''}" data-tag="${idx}">#${esc(tg)}</button>`;
    });
    if(graphTags.size) s+=`<button class="gf-chip mini" data-cleartags="1">${t("태그 해제")}</button>`;
    s+=`</div>`;
  }
  s+=`<div class="gf-row"><button class="gf-chip mini" data-arrange="1">${t("⟲ 자동 정렬")}</button><span class="gf-lbl" style="width:auto">${t("노드를 끌어 고정할 수 있어요")}</span></div>`;
  box.innerHTML=s;
  box.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>toggleGraphCat(b.dataset.cat));
  box.querySelectorAll("[data-tag]").forEach(b=>b.onclick=()=>toggleGraphTag(tags[+b.dataset.tag]));
  box.querySelectorAll("[data-cleartags]").forEach(b=>b.onclick=()=>clearGraphTags());
  box.querySelectorAll("[data-arrange]").forEach(b=>b.onclick=()=>graphAutoArrange());
}

/* --- 관계도(그래프): force-directed 배치 --- */
let graphSim=null;
function stopGraphSim(){ if(graphSim&&graphSim.raf){ cancelAnimationFrame(graphSim.raf); graphSim.raf=null; } }
function graphAutoArrange(){ W.graphPos={}; graphSim=null; renderGraph(); markDirty(); }
function renderGraph(){
  renderGraphFilter();
  const svg=document.getElementById("graphSvg");
  const cw=svg.clientWidth||document.getElementById("center").clientWidth;
  const ch=svg.clientHeight||document.getElementById("center").clientHeight;
  const nodes=allItems().filter(graphVisible);
  if(nodes.length===0){ stopGraphSim(); graphSim=null; svg.innerHTML=""; return; }
  const vis=new Set(nodes.map(n=>n.id));
  const links=W.links.filter(l=>vis.has(l.from)&&vis.has(l.to));
  const key=nodes.map(n=>n.id).sort().join(",")+"||"+links.map(l=>l.from+">"+l.to+":"+l.rel+(l.relBack||"")).join(",");
  if(graphSim && graphSim.key===key){ updateGraphHighlight(); return; }  // 노드·관계 동일 → 강조만 갱신
  stopGraphSim();
  const pin=W.graphPos||{};
  const cx=cw/2, cy=88+(ch-88)/2, R=Math.min(cw,ch-88)/2-70;
  const N=nodes.map((n,i)=>{ const p=pin[n.id], a=i/nodes.length*Math.PI*2;
    return { id:n.id, cat:n.cat, name:n.name||"",
      x: p?p.x:(cx+R*Math.cos(a)+(Math.random()-.5)*30),
      y: p?p.y:(cy+R*Math.sin(a)+(Math.random()-.5)*30),
      vx:0, vy:0, pinned:!!p }; });
  const byId={}; N.forEach(n=>byId[n.id]=n);
  let s="";
  links.forEach((l,i)=>{ s+=`<line class="ge" data-i="${i}" stroke="#3b4160" stroke-width="1.5"/>
    <text class="gel" data-i="${i}" fill="#e0af68" font-size="10" text-anchor="middle"></text>`; });
  N.forEach(n=>{ const c=CATS[n.cat];
    s+=`<g class="gn" data-id="${n.id}" style="cursor:grab">
      <circle r="9" fill="${c.color}" stroke="#1a1b26" stroke-width="2"/>
      <text y="-15" fill="#c0caf5" font-size="12" text-anchor="middle">${esc(n.name||"")}</text></g>`; });
  svg.innerHTML=s;
  const lineEls=[...svg.querySelectorAll("line.ge")], labEls=[...svg.querySelectorAll("text.gel")], nodeEls={};
  links.forEach((l,i)=>{ labEls[i].textContent = l.relBack?`${l.rel} ⇄ ${l.relBack}`:`→ ${l.rel}`; });
  svg.querySelectorAll("g.gn").forEach(g=>{ nodeEls[g.dataset.id]=g; enableGraphDrag(g, byId[g.dataset.id]); });
  graphSim={ key, nodes:N, byId, links, lineEls, labEls, nodeEls, cx, cy, alpha:1, raf:null, drag:null };
  updateGraphHighlight(); drawGraph(); startGraphSim(0.9);
}
function startGraphSim(a){ if(!graphSim) return; graphSim.alpha=Math.max(graphSim.alpha, a||0.6);
  if(!graphSim.raf) graphSim.raf=requestAnimationFrame(graphTick); }
function graphTick(){
  const s=graphSim; if(!s){ return; }
  const N=s.nodes, byId=s.byId, REP=6500, LINK=115, K=0.02, CENTER=0.003, DAMP=0.9;
  for(let i=0;i<N.length;i++) for(let j=i+1;j<N.length;j++){
    const a=N[i],b=N[j]; let dx=b.x-a.x, dy=b.y-a.y, d2=dx*dx+dy*dy||0.01, d=Math.sqrt(d2);
    const f=REP/d2, fx=dx/d*f, fy=dy/d*f; a.vx-=fx; a.vy-=fy; b.vx+=fx; b.vy+=fy;
  }
  s.links.forEach(l=>{ const a=byId[l.from], b=byId[l.to]; if(!a||!b) return;
    let dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy)||0.01, f=(d-LINK)*K, fx=dx/d*f, fy=dy/d*f;
    a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy; });
  N.forEach(n=>{ if(n.pinned||n===s.drag){ n.vx=0; n.vy=0; return; }
    n.vx=(n.vx+(s.cx-n.x)*CENTER)*DAMP; n.vy=(n.vy+(s.cy-n.y)*CENTER)*DAMP;
    n.x+=n.vx*s.alpha; n.y+=n.vy*s.alpha; });
  s.alpha*=0.985; drawGraph();
  if(s.alpha>0.03) s.raf=requestAnimationFrame(graphTick); else s.raf=null;
}
function drawGraph(){
  const s=graphSim; if(!s) return;
  s.links.forEach((l,i)=>{ const a=s.byId[l.from], b=s.byId[l.to]; if(!a||!b) return;
    const ln=s.lineEls[i]; ln.setAttribute("x1",a.x); ln.setAttribute("y1",a.y); ln.setAttribute("x2",b.x); ln.setAttribute("y2",b.y);
    const lb=s.labEls[i]; lb.setAttribute("x",(a.x+b.x)/2); lb.setAttribute("y",(a.y+b.y)/2); });
  for(const id in s.nodeEls){ const n=s.byId[id]; s.nodeEls[id].setAttribute("transform",`translate(${n.x},${n.y})`); }
}
function updateGraphHighlight(){
  const s=graphSim; if(!s) return;
  for(const id in s.nodeEls){ const on=isSel(id), c=s.nodeEls[id].querySelector("circle");
    c.setAttribute("r", on?12:9); c.setAttribute("stroke", on?"#fff":"#1a1b26"); }
}
function enableGraphDrag(g,node){
  g.addEventListener("pointerdown",e=>{ e.stopPropagation();
    const svg=document.getElementById("graphSvg"), rect=svg.getBoundingClientRect();
    let moved=false, sx=e.clientX, sy=e.clientY; graphSim.drag=node;
    const mv=ev=>{ if(Math.abs(ev.clientX-sx)+Math.abs(ev.clientY-sy)>3) moved=true;
      node.x=ev.clientX-rect.left; node.y=ev.clientY-rect.top; node.vx=0; node.vy=0; startGraphSim(0.5); };
    const up=()=>{ window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up);
      graphSim.drag=null;
      if(!moved){ selectItem(node.id); }
      else { node.pinned=true; (W.graphPos=W.graphPos||{})[node.id]={x:node.x,y:node.y}; markDirty(); } };
    window.addEventListener("pointermove",mv); window.addEventListener("pointerup",up);
  });
}

/* --- 연표 --- */
function autoSortEvents(list){
  return [...list].sort((a,b)=>(a.when||"").localeCompare(b.when||"","ko",{numeric:true}));
}
function normalizeOrders(){
  [...W.events].sort((a,b)=>(a.order??1e9)-(b.order??1e9)).forEach((e,i)=>e.order=i);
}
function setTimelineManual(on){
  if(on && !W.timelineManual){
    // 수동으로 켤 때: 현재 자동(시점) 순서를 기준으로 순서를 고정
    autoSortEvents(W.events).forEach((e,i)=>e.order=i);
  }
  W.timelineManual=on;
  renderTimeline(); markDirty();
}
function moveEvent(id,dir){
  normalizeOrders();
  const evs=[...W.events].sort((a,b)=>a.order-b.order);

function wikiToDoc(text){
  if(!text) return "";
  const re=/\{\{([^}]+)\}\}/g; let out="",last=0,m;
  while((m=re.exec(text))){ out+=esc(text.slice(last,m.index));
    const n=m[1].trim(); const it=allItems().find(x=>(x.name||"").toLowerCase()===n.toLowerCase());
    out+= it?`<a href="#i${it.id}">${esc(it.name)}</a>`:esc(n); last=m.index+m[0].length; }
  out+=esc(text.slice(last)); return out.replace(/\n/g,"<br>");
}

/* ============ 지도 이미지(PNG) 내보내기 ============ */
function hexA(hex,a){ const n=parseInt((hex||"#7aa2f7").slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
function drawCover(c,img,dx,dy,dw,dh){ const ir=img.width/img.height, dr=dw/dh; let sw,sh,sx,sy;
  if(ir>dr){ sh=img.height; sw=sh*dr; sx=(img.width-sw)/2; sy=0; } else { sw=img.width; sh=sw/dr; sx=0; sy=(img.height-sh)/2; }
  c.drawImage(img,sx,sy,sw,sh,dx,dy,dw,dh); }
function drawTextC(c,text,x,y,size,color,center,shadow){
  c.font=`700 ${size}px "Malgun Gothic","Apple SD Gothic Neo",sans-serif`;
  c.textAlign=center?"center":"left"; c.textBaseline="middle";
  if(shadow){ c.lineWidth=4; c.lineJoin="round"; c.strokeStyle="rgba(0,0,0,.7)"; c.strokeText(text,x,y); }
