function exportMapPNG(){
  saveTerrain();
  const vis=W.places.filter(p=>visibleOnMap(p,W.currentMap));
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  const add=(x,y)=>{ if(x<minX)minX=x; if(y<minY)minY=y; if(x>maxX)maxX=x; if(y>maxY)maxY=y; };
  vis.forEach(p=>{ if(p.points) p.points.forEach(pt=>add(pt.x,pt.y)); else add(p.x,p.y); });
  if(minX>maxX){ minX=0;minY=0;maxX=1600;maxY=1200; }
  const pad=140; minX-=pad; minY-=pad; maxX+=pad; maxY+=pad;
  const w=Math.max(1,Math.round(maxX-minX)), h=Math.max(1,Math.round(maxY-minY));
  const cv=document.createElement("canvas"); cv.width=w; cv.height=h; const c=cv.getContext("2d");
  const m=curMap();
  const doCompose=(bgImg)=>{
    c.fillStyle=(m.bg&&m.bg.type==="color"&&m.bg.value)||"#161821"; c.fillRect(0,0,w,h);
    c.save(); c.translate(-minX,-minY);
    if(bgImg) drawCover(c,bgImg,0,0,(m.mapW||4000),(m.mapH||3000));
    try{ c.drawImage(baseCanvas,0,0); }catch(e){}
    try{ c.drawImage(canvas,0,0); }catch(e){}
    vis.forEach(p=>{ if(p.shape==="area"&&p.points&&p.points.length>=2){ const pa=new Path2D(areaPathD(p));
      c.fillStyle=hexA(p.color,0.28); c.fill(pa,"evenodd"); c.lineJoin="round"; c.strokeStyle=p.color||"#7aa2f7"; c.lineWidth=2.5; c.stroke(pa); } });
    vis.forEach(p=>{ if(p.shape==="line"&&p.points&&p.points.length>=2){ const pa=new Path2D(p.curve?smoothOpenPath(p.points):polyPathD(p.points,false));
      c.strokeStyle=p.color||"#7dcfff"; c.lineWidth=p.width||3; c.lineCap="round"; c.lineJoin="round"; c.stroke(pa); } });
    vis.forEach(p=>{ if(p.shape==="area"){ const a=placeAnchor(p); drawTextC(c,p.name||"지역",a.x,a.y,15,"#fff",true,true); } });
    vis.forEach(p=>{ if(p.shape==="area"||p.shape==="line"||p.shape==="label") return;
      c.beginPath(); c.arc(p.x,p.y,12,0,Math.PI*2); c.fillStyle=CATS.place.color; c.fill();
      c.lineWidth=3; c.strokeStyle="#12141d"; c.stroke();
      drawTextC(c, p.icon||"📍", p.x, p.y, 15, "#fff", true, false);
      drawTextC(c, p.name||"장소", p.x, p.y+24, 13, "#fff", true, true); });
    vis.forEach(p=>{ if(p.shape==="label") drawTextC(c,p.name||"텍스트",p.x,p.y,p.size||22,p.color||"#e8ecff",true,true); });
    c.restore();
    const dataUrl=cv.toDataURL("image/png");
    const name=(m.name||"map")+".png";
    if(inTauriApp()){
      const base64=dataUrl.split(",")[1];
      tinvoke("save_png_dialog",{ defaultName:name, dataBase64:base64 }).then(p=>{
        if(!p) return;   // 취소
        showSaved(curLang()==="en"?"Saved PNG":"PNG로 저장됨");
      }).catch(e=>{ appAlert((curLang()==="en"?"Save failed: ":"저장 실패: ")+e); });
    } else {
      const a=document.createElement("a"); a.href=dataUrl; a.download=name; a.click();
    }
  };
  if(m.bg && m.bg.type==="image" && m.bg.value){
    const img=new Image(); img.onload=()=>doCompose(img); img.onerror=()=>doCompose(null); img.src=m.bg.value;
  } else doCompose(null);
}

/* ============ 일관성 점검 (규칙 기반·오프라인) ============ */
function runConsistencyCheck(){
  const issues=[], items=allItems(), ids=new Set(items.map(i=>i.id)), nameMap={};
  const en=curLang()==="en", noName=en?"(no name)":"(무명)";
  items.forEach(i=>{ const n=(i.name||"").trim().toLowerCase(); if(n)(nameMap[n]=nameMap[n]||[]).push(i); });
  Object.values(nameMap).forEach(arr=>{ if(arr.length>1) issues.push({level:"warn",msg:en?`Duplicate name: "${arr[0].name}" (${arr.length})`:`이름 중복: "${arr[0].name}" (${arr.length}개)`,id:arr[0].id}); });
  items.forEach(i=>{ const desc=findItem(i.id).ref.desc||"", re=/\{\{([^}]+)\}\}/g; let m;
    while((m=re.exec(desc))){ const n=m[1].trim().toLowerCase(); if(!nameMap[n]) issues.push({level:"warn",msg:en?`Link {{${m[1].trim()}}} in "${i.name||noName}" has no matching item`:`${i.name||noName}의 설명에 없는 링크 {{${m[1].trim()}}}`,id:i.id}); } });
  const seen=new Set();
  W.links.forEach(l=>{
    if(!ids.has(l.from)||!ids.has(l.to)){ issues.push({level:"warn",msg:en?`Relation points to a nonexistent item`:`존재하지 않는 항목을 가리키는 관계`}); return; }
    if(l.from===l.to) issues.push({level:"info",msg:(en?`Self relation: `:`자기 자신과의 관계: `)+itemName(l.from),id:l.from});
    const k=[l.from,l.to].sort().join("|"); if(seen.has(k)) issues.push({level:"info",msg:(en?`Duplicate relation: `:`중복 관계: `)+`${itemName(l.from)} ↔ ${itemName(l.to)}`,id:l.from}); seen.add(k);
  });
  W.events.forEach(e=>{ if(!e.when) issues.push({level:"info",msg:(en?`Event with no date: `:`시점 미정 사건: `)+(e.name||noName),id:e.id}); });
  const noDesc=items.filter(i=>!(findItem(i.id).ref.desc||"").trim() && i.shape!=="label");
  if(noDesc.length) issues.push({level:"info",msg:en?`${noDesc.length} item(s) with empty description`:`설명이 비어 있는 항목 ${noDesc.length}개`});
  return issues;
}
/* ── 일관성 점검 독(dock): 모달이 아닌 우상단 고정 패널. 결과는 다음 점검 전까지 유지 ── */
let _aiChkResults=null;   // {items:[{level,msg,refs,jid}], stamp} | {error} | null(=미실행)
let _aiChkBusy=false;
function openConsistencyModal(){ toggleChkDock(); }   // 툴바 '점검' 버튼 → 독 열고닫기 토글
function toggleChkDock(force){
  const d=document.getElementById("chkDock"); if(!d) return;
  const show = (force===undefined) ? d.classList.contains("off") : !!force;
  d.classList.toggle("off", !show);
  if(show) renderChkDock();
}
function renderChkDock(){
  const body=document.getElementById("chkDockBody"); if(!body) return;
  const issues=runConsistencyCheck();
  const en=curLang()==="en";
  const warn=issues.filter(i=>i.level==="warn").length, info=issues.length-warn;
  let h=`<div class="chk-sec">${en?`Rule check · Warn ${warn} / Info ${info}`:`규칙 점검 · 경고 ${warn} / 참고 ${info}`}</div>`;
  if(!issues.length) h+=`<p class="chk-ok">${t("문제 없음 👍")}</p>`;
  else{ h+=`<div class="chk-list">`;
    issues.forEach(it=>{ h+=`<div class="chk-row ${it.level}"${it.id?` data-jump="${it.id}"`:""}><span class="chk-dot"></span><span>${esc(it.msg)}</span></div>`; });
    h+=`</div>`; }
  h+=`<div class="chk-sec" style="margin-top:12px">${t("AI 심층 점검")}</div>`;
  { const allDis=(W.meta.chkDismissed||[]).length;
    if(allDis) h+=`<button class="chk-restore" onclick="openChkDismissedModal()">${en?`Manage dismissed (${allDis})`:`확인함 목록 관리 (${allDis}개)`}</button>`; }
  if(_aiChkBusy) h+=`<p class="chk-muted">${t("AI가 점검 중…")}</p>`;
  else if(_aiChkResults==null) h+=`<p class="chk-muted">${en?"Press 🔍 to check for logical / setting contradictions.":"🔍 버튼을 눌러 논리·설정 모순을 검사하세요."}</p>`;
  else if(_aiChkResults.error) h+=`<p class="chk-err">${en?"Failed: ":"실패: "}${esc(_aiChkResults.error)}</p>`;
  else if(!_aiChkResults.items.length) h+=`<p class="chk-ok">${t("모순 없음 👍")}</p>`;
  else{
    const dis=new Set(W.meta.chkDismissed||[]);
    let shown=0, hidden=0, rows="";
    _aiChkResults.items.forEach((it,idx)=>{
      if(dis.has(chkKey(it))){ hidden++; return; }
      shown++;
      const tag=(it.refs&&it.refs.length)?` <span class="chk-refs">[${esc(it.refs.join(", "))}]</span>`:"";
      rows+=`<div class="chk-row ${it.level}"><span class="chk-dot"></span><span class="chk-msg">${esc(it.msg)}${tag}</span><button class="chk-dismiss" title="${t("확인함(다음 점검부터 숨기기)")}" data-idx="${idx}">✓</button></div>`;
    });
    const stamp=esc(_aiChkResults.stamp||"");
    h+=`<p class="chk-muted">${en?`${shown} found${hidden?` · ${hidden} hidden`:""} · as of ${stamp}`:`${shown}건${hidden?` · 숨김 ${hidden}`:""} · ${stamp} 기준`}</p>`;
    h+= shown ? `<div class="chk-list">${rows}</div>` : `<p class="chk-ok">${t("표시할 모순 없음 👍")}</p>`;
    if(hidden) h+=`<button class="chk-restore" onclick="restoreChkDismissed()">${en?`Show ${hidden} hidden`:`숨긴 ${hidden}개 다시 보기`}</button>`;
  }
  body.innerHTML=h;
  // 규칙 점검 행: 클릭 시 해당 항목으로 이동(독은 유지)
  body.querySelectorAll(".chk-row[data-jump]").forEach(r=>r.onclick=()=>selectItem(r.dataset.jump));
  // AI 점검 행: ✓ 확인함 → 숨기기
  body.querySelectorAll(".chk-dismiss").forEach(b=>b.onclick=()=>dismissChk(+b.dataset.idx));
}
/* 확인함: 지적 문구를 정규화한 값을 키로, 세계 데이터에 저장(저장·내보내기에 함께 유지) */
function chkKey(it){ return (it.msg||"").replace(/\s+/g," ").trim(); }
function dismissChk(idx){
  if(!_aiChkResults||!_aiChkResults.items[idx]) return;
  const k=chkKey(_aiChkResults.items[idx]); if(!k) return;
  W.meta.chkDismissed=W.meta.chkDismissed||[];
  if(!W.meta.chkDismissed.includes(k)){ W.meta.chkDismissed.push(k); markDirty(); }
  renderChkDock();
}
function restoreChkDismissed(){
  if(!_aiChkResults) return;
  const cur=new Set(_aiChkResults.items.map(chkKey));   // 지금 결과에 해당하는 숨김만 해제
  W.meta.chkDismissed=(W.meta.chkDismissed||[]).filter(k=>!cur.has(k));
  markDirty(); renderChkDock();
}
/* 확인함 목록 관리 모달: 현재 점검 결과와 무관하게, 지금까지 확인함 처리된 문구를 전부 보여주고 개별 해제 */
function openChkDismissedModal(){
  const en=curLang()==="en";
  const list=W.meta.chkDismissed||[];
  const rows = list.length
    ? list.map((k,idx)=>`<div class="chk-row"><span class="chk-msg">${esc(k)}</span><button class="chk-undo" data-idx="${idx}" title="${t("확인함 해제")}">✕</button></div>`).join("")
    : `<p class="chk-muted" style="margin:6px 0">${en?"No dismissed items yet.":"확인함 처리된 항목이 없습니다."}</p>`;
  openModal(`<h2>${t("확인함 목록")}</h2>

function undoChkDismiss(idx){
  const list=W.meta.chkDismissed||[];
  if(idx<0||idx>=list.length) return;
  list.splice(idx,1);
  markDirty();
  renderChkDock();          // 독의 숨김 개수 표시도 즉시 갱신
  openChkDismissedModal();  // 모달은 열어둔 채 목록만 새로고침
}
/* ── AI 심층 점검: 규칙으로 못 잡는 논리·설정·시간·지리 모순을 찾는다 ── */
function aiRelationsList(){
  const rel0=curLang()==="en"?"related":"관계";
  return W.links.map(l=>{
    const a=itemName(l.from), b=itemName(l.to);
    return l.relBack ? `${a} ←${l.relBack}/${l.rel||rel0}→ ${b}` : `${a} —${l.rel||rel0}→ ${b}`;
  }).join("\n");
}
function aiTimelineList(){
  const en=curLang()==="en", noDate=en?"(undated)":"(시점미정)", noName=en?"(no name)":"(무명)";
  const evs=(W.events||[]).slice().sort((x,y)=>String(x.when||"").localeCompare(String(y.when||"")));
  return evs.map(e=>{ const d=stripWiki(e.desc||"").replace(/\s+/g," ").trim();
    return `${e.when||noDate}: ${e.name||noName}${d?` — ${d.slice(0,120)}`:""}`; }).join("\n");
}
async function aiConsistencyCheck(){
  const c=aiCfg(); if(!c.baseURL||!c.model){ openAIModal(); return; }
  toggleChkDock(true);                 // 독을 열고
  _aiChkBusy=true; renderChkDock();    // "점검 중…" 표시
  const list=aiWorldList(), geo=aiGeoContext(), rels=aiRelationsList(), tl=aiTimelineList();
  const en=curLang()==="en";
  const ex=(W.meta.chkDismissed||[]).filter(Boolean);
  // 예외는 데이터 뒤(끝부분)에 배치해 최신성 효과로 준수율을 높인다
  const exBlock = ex.length ? (en ? `

[Exclusion list — must obey]
The following were reviewed by the author as intentional settings. Never report any problem that is essentially the same as these, even if worded differently.
- ${ex.join("\n- ")}

Omit any finding that matches the exclusion list, and output only the other new contradictions as a JSON array.` : `

[제외 목록 — 반드시 준수]
아래는 작가가 의도한 설정으로 검토를 마친 항목입니다. 이것들과 본질적으로 같은 문제는 표현을 바꾸더라도 절대 보고하지 마세요.
- ${ex.join("\n- ")}

위 제외 목록에 해당하는 지적은 출력에서 모두 빼고, 그 외의 새로운 모순만 JSON 배열로 출력하세요.`) : "";
  const sys=en
    ? "You are a reviewer of worldbuilding settings. Find only the parts of the given material that contradict each other or don't add up. Do not invent new settings by guessing; point out only conflicts actually present in the material. Never report items in the provided 'exclusion list', even if worded differently. Write all values in English and output only a JSON array with no commentary."
    : "당신은 세계관 설정의 감수자입니다. 주어진 세계관 자료에서 서로 모순되거나 앞뒤가 맞지 않는 부분만 찾아냅니다. 추측으로 새 설정을 만들지 말고, 자료에 실제로 드러난 충돌만 지적하세요. 제공되는 '제외 목록'의 항목은 표현이 달라도 절대 보고하지 마세요. 모든 값을 한국어로 작성하고, 설명 없이 JSON 배열만 출력하세요.";
  const usr=en
    ? `Find up to 10 logical contradictions / setting conflicts in the world material below.
Types to look for: timeline conflicts (a dead or vanished character appearing in later events, etc.), relation contradictions (allied yet hostile, etc.), geographic contradictions (the same thing placed in different locations), setting clashes (descriptions that disagree), causal inconsistencies.
If there are none, output an empty array [].
In each item's refs, put only the 'exact names' of the related items (the part before '—' on each World items line).
Output only a JSON array: [{"level":"warn|info","msg":"one sentence on what contradicts and why","refs":["name1","name2"]}]

[World items]
${list}${rels?`\n\n[Relations]\n${rels}`:""}${tl?`\n\n[Timeline]\n${tl}`:""}${geo?`\n\n[Geography]\n${geo}`:""}${exBlock}`
    : `아래 세계관 자료에서 논리적 모순·설정 충돌을 찾아 최대 10개까지 지적하세요.
살펴볼 유형 예시: 시간선 충돌(죽거나 사라진 인물이 이후 사건에 등장 등), 관계 모순(적대이면서 동맹 등), 지리 모순(같은 대상이 서로 다른 곳에 위치), 설정 상충(설명끼리 어긋남), 인과 불일치.
문제가 없으면 빈 배열 []을 출력하세요.
각 항목의 refs에는 관련 항목의 '정확한 이름'만 넣으세요(세계 항목 각 줄 '—' 앞부분).
JSON 배열만 출력: [{"level":"warn|info","msg":"무엇이 왜 모순인지 한 문장","refs":["이름1","이름2"]}]

[세계 항목]
${list}${rels?`\n\n[관계]\n${rels}`:""}${tl?`\n\n[연표]\n${tl}`:""}${geo?`\n\n[지리]\n${geo}`:""}${exBlock}`;
  const messages=[{role:"system",content:sys},{role:"user",content:usr}];
  console.log("[AI 심층 점검] payload →", messages);
  try{
    const raw=await aiChat(messages, aiTemp("check"));   // 점검은 규칙 준수가 중요 → 낮은 온도(설정 가능)
    console.log("[AI 심층 점검] 응답 ←", raw);
    const arr=parseJsonLoose(raw), stamp=new Date().toLocaleTimeString();
    if(!Array.isArray(arr)){ _aiChkResults={items:[], error:(curLang()==="en"?"Couldn't parse the result.":"결과를 해석하지 못했습니다."), stamp}; }
    else{
      const items=arr.map(it=>{
        const refs=Array.isArray(it.refs)?it.refs.filter(Boolean):[];
        return { level:(it.level==="warn")?"warn":"info", msg:it.msg||"", refs };
      });
      _aiChkResults={ items, stamp };
    }
  }catch(e){ _aiChkResults={items:[], error:e.message, stamp:new Date().toLocaleTimeString()}; }
  _aiChkBusy=false; renderChkDock();   // 결과는 _aiChkResults에 남아 독을 닫아도 유지됨
}

/* 메시지 배열 → 텍스트 컴플리션용 프롬프트로 직렬화 */
function messagesToPrompt(messages){
  return messages.map(m=>m.content).join("\n\n").trim()+"\n\n";
}
async function aiChat(messages, temperature){
  const c=aiCfg(); if(!c.baseURL||!c.model) throw new Error(curLang()==="en"?"AI is not configured.":"AI가 설정되지 않았습니다.");
  const headers={ "Content-Type":"application/json", ...(c.apiKey?{Authorization:"Bearer "+c.apiKey}:{}) };
  const temp = (typeof temperature==="number") ? temperature : 0.8;   // 미지정 시 기본 0.8
  const completion = (c.mode==="completion");
  const url = c.baseURL + (completion ? "/completions" : "/chat/completions");
  const body = completion
    ? JSON.stringify({ model:c.model, prompt:messagesToPrompt(messages), temperature:temp, max_tokens:2048 })
    : JSON.stringify({ model:c.model, messages, temperature:temp });
  // 데스크톱(Tauri) 빌드에선 Rust 커스텀 명령 ai_fetch 로 요청 → CORS 없이 로컬·클라우드 모두 연결.
  // 브라우저에선 일반 fetch 로 폴백.
  const invoke = (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke) || null;
  let status, text;
  if(invoke){
    const r = await invoke("ai_fetch", { url, method:"POST", headers, body });
    status = r.status; text = r.body;
  } else {
    const res = await fetch(url,{method:"POST",headers,body});
    status = res.status; text = await res.text();
  }
  if(status<200 || status>=300) throw new Error((curLang()==="en"?"Request failed ":"요청 실패 ")+status+": "+(text||"").slice(0,180));
  const d=JSON.parse(text), ch=d.choices&&d.choices[0];
  return (completion ? (ch&&ch.text) : (ch&&ch.message&&ch.message.content)) || "";
}

function aiContextOf(id){

  if(it.kind==="place" && r.shape!=="line" && r.shape!=="label"){ const A=areaOf(r); if(A) L.push(en?`Area: ${A.name} (${_quad(A,placeAnchor(r))} of it)`:`소속 지역: ${A.name} (그 지역의 ${_quad(A,placeAnchor(r))})`); }
  if(r.when) L.push((en?"When: ":"시점: ")+r.when);
  if(r.tags&&r.tags.length) L.push((en?"Tags: ":"태그: ")+r.tags.join(", "));
  const rels=linksOf(id).map(l=>`${itemName(l.other)}(${l.label})`); if(rels.length) L.push((en?"Relations: ":"관계: ")+rels.join(", "));
  const kids=childrenOf(id).map(k=>k.name); if(kids.length) L.push((en?"Children: ":"하위: ")+kids.join(", "));
  if((r.desc||"").trim()) L.push((en?"Current description: ":"현재 설명: ")+stripWiki(r.desc));
  return L.join("\n");
}

/* 응답에서 JSON 배열/객체를 느슨하게 추출 (모델이 코드펜스·군더더기를 붙여도 파싱) */
function parseJsonLoose(text){
  let t=(text||"").replace(/```json/gi,"").replace(/```/g,"").trim();
  const a=t.indexOf("["), b=t.lastIndexOf("]");
  if(a>=0&&b>a){ try{ return JSON.parse(t.slice(a,b+1)); }catch(e){} }
  const oa=t.indexOf("{"), ob=t.lastIndexOf("}");
  if(oa>=0&&ob>oa){ try{ return JSON.parse(t.slice(oa,ob+1)); }catch(e){} }
  return null;
}
/* 세계 항목을 분류별로 (이름 — 설명) 나열. 이름은 '—' 앞부분.
   평소엔 설명 전체를 담고, 총량이 예산(문자수)을 넘으면 그때만 항목별로 줄인다. */
const AI_CTX_BUDGET=30000; // 대략 문자수 상한(한국어 ≈ 토큰 근사)
function aiWorldList(){
  const clean=s=>stripWiki(s||"").replace(/\s+/g," ").trim();
  const items=allItems(), noName=curLang()==="en"?"(no name)":"(무명)";
  const build=(cap)=>{ const by={};
    items.forEach(i=>{ let d=clean(findItem(i.id).ref.desc); if(cap&&d.length>cap) d=d.slice(0,cap)+"…";
      (by[i.cat]=by[i.cat]||[]).push(d?`${i.name} — ${d}`:(i.name||noName)); });
    return Object.entries(by).map(([k,ns])=>`${t(CATS[k].label)}:\n  - ${ns.join("\n  - ")}`).join("\n"); };
  const uc=appSettings().ctxCap;                              // 설정: 항목당 설명 글자수 제한(비우면 최대)
  const userCap=(typeof uc==="number"&&uc>0)?uc:0;
  const full=build(userCap);
  if(full.length<=AI_CTX_BUDGET) return full;                 // 예산 내 → 설정대로(또는 전체)
  const trimmed=build(Math.max(60, Math.floor(AI_CTX_BUDGET/Math.max(items.length,1)))); // 초과 → 항목별 축약
  return trimmed.length>AI_CTX_BUDGET ? trimmed.slice(0,AI_CTX_BUDGET)+"…" : trimmed;      // 최종 하드 캡
}
/* ── 지리 요약(자연어) : 방위(위=북)·포함·연결·거리를 문장으로 ── */
function _compass(dx,dy){ const deg=(Math.atan2(dx,-dy)*180/Math.PI+360)%360; const i=Math.round(deg/45)%8;
  return (curLang()==="en"?["N","NE","E","SE","S","SW","W","NW"]:["북","북동","동","남동","남","남서","서","북서"])[i]; }
function _quad(area,pt){ const xs=area.points.map(p=>p.x),ys=area.points.map(p=>p.y); const mnX=Math.min(...xs),mxX=Math.max(...xs),mnY=Math.min(...ys),mxY=Math.max(...ys); const fx=(pt.x-mnX)/((mxX-mnX)||1),fy=(pt.y-mnY)/((mxY-mnY)||1);
  if(curLang()==="en"){ const ns=fy<0.34?"N":fy>0.66?"S":"",ew=fx<0.34?"W":fx>0.66?"E":""; return (ns+ew)?`${ns}${ew} part`:"center"; }
  const ns=fy<0.34?"북":fy>0.66?"남":"",ew=fx<0.34?"서":fx>0.66?"동":""; return (ns+ew)?(ns+ew+"부"):"중앙부"; }
function _near(pt,list,ex){ let best=null,bd=Infinity; list.forEach(q=>{ if(q.id===ex||q.shape==="line"||q.shape==="label")return; const a=placeAnchor(q),d=Math.hypot(a.x-pt.x,a.y-pt.y); if(d<bd){bd=d;best=q;} }); return best; }
function aiGeoContext(){
  const P=W.places; if(!P.some(p=>p.shape!=="label")) return "";
  const en=curLang()==="en";
  const sc=W.meta.scale, out=[en?"Geography summary (bearings: up on the map = North):":"지리 요약 (방위는 지도 위=북 기준):"];
  W.maps.forEach(m=>{
    const on=P.filter(p=>p.mapId===m.id); if(!on.length) return;
    if(W.maps.length>1) out.push(en?`[Map: ${m.name}]`:`[지도: ${m.name}]`);
    const areas=on.filter(p=>p.shape==="area");
    areas.forEach(a=>{
      const kids=on.filter(p=>{const A=areaOf(p); return A&&A.id===a.id;});
      out.push((en?`- Area '${a.name}'`:`- 영역 '${a.name}'`)+(kids.length?(en?` (contains: ${kids.map(k=>k.name).join(", ")})`:` (포함: ${kids.map(k=>k.name).join(", ")})`):""));
      kids.forEach(k=>{ if(k.shape==="line"||k.shape==="label")return; out.push(en?`  · ${k.name}: ${_quad(a,placeAnchor(k))} of '${a.name}'`:`  · ${k.name}: '${a.name}'의 ${_quad(a,placeAnchor(k))}`); });
    });
    on.filter(p=>(!p.shape||p.shape==="point")&&!areaOf(p)).forEach(p=>out.push(en?`- ${p.name}: not inside any area`:`- ${p.name}: 어느 영역에도 속하지 않음`));
    if(areas.length>=2 && areas.length<=6) for(let i=0;i<areas.length;i++)for(let j=i+1;j<areas.length;j++){
      const A=placeAnchor(areas[i]),B=placeAnchor(areas[j]); out.push(en?`- '${areas[i].name}' is to the ${_compass(A.x-B.x,A.y-B.y)} of '${areas[j].name}'`:`- '${areas[i].name}'은(는) '${areas[j].name}'의 ${_compass(A.x-B.x,A.y-B.y)}쪽`); }
    on.filter(p=>p.shape==="line").forEach(ln=>{ if(!ln.points||ln.points.length<2)return;
      const na=_near(ln.points[0],on,ln.id), nb=_near(ln.points[ln.points.length-1],on,ln.id);
      let len=0; for(let k=0;k<ln.points.length-1;k++) len+=Math.hypot(ln.points[k+1].x-ln.points[k].x,ln.points[k+1].y-ln.points[k].y);
      const A0=na?na.name:(en?"one point":"한 지점"), B0=nb?nb.name:(en?"another point":"다른 지점");
      out.push((en?`- Line '${ln.name}': `:`- 선 '${ln.name}': `)+`${A0} ↔ ${B0}`+(sc&&sc.perPx?(en?` (length ≈ ${Math.round(len*sc.perPx)} ${sc.unit||"km"})`:` (길이 약 ${Math.round(len*sc.perPx)} ${sc.unit||"km"})`):"")); });
  });
  if(sc&&sc.perPx) out.push((en?"Scale: ":"축척: ")+`1px = ${sc.perPx} ${sc.unit||"km"}`);
  return out.join("\n");
}

/* ============ 되돌리기 / 다시 실행 (지형·이미지 포함) ============
   스냅샷은 컨테이너만 새로 만들고 문자열(지형·이미지 dataURL)은 참조를 공유한다.
   → 바뀌지 않은 큰 blob은 여러 스냅샷이 같은 메모리를 가리켜 메모리 폭증이 없다. */
let undoHist=[], histIndex=-1, restoringHist=false;
function cloneShare(v){
  if(Array.isArray(v)) return v.map(cloneShare);
  if(v && typeof v==="object"){ const o={}; for(const k in v) o[k]=cloneShare(v[k]); return o; }
  return v;   // 원시값(문자열 포함)은 참조 공유
}
/* 변경 감지용 가벼운 서명: 큰 문자열은 길이로 대체 */
function sigOf(){ return JSON.stringify(W, (k,v)=> (k==="terrain"||k==="image") ? (v?("§"+v.length):null) : v); }
function recordHistory(){
  const sig=sigOf();
  if(undoHist[histIndex] && undoHist[histIndex].sig===sig) return;
  undoHist=undoHist.slice(0,histIndex+1);
  undoHist.push({sig, snap:cloneShare(W)});
  if(undoHist.length>80) undoHist.shift();
  histIndex=undoHist.length-1;
  updUndoButtons();
}
function updUndoButtons(){
  const u=document.getElementById("undoBtn"), r=document.getElementById("redoBtn");
  if(u) u.disabled = histIndex<=0;
  if(r) r.disabled = histIndex>=undoHist.length-1;
}
function restoreHist(entry){
  restoringHist=true;
  W=cloneShare(entry.snap);   // 저장본이 이후 편집에 오염되지 않도록 다시 복제
  if(!W.maps.find(m=>m.id===W.currentMap)) W.currentMap=W.maps[0].id;
  sel=null; selSet.clear();
  document.getElementById("worldTitle").value=W.meta.title||"";
  applyMap(); loadTerrain(); renderMapBar(); renderAll();
  updUndoButtons(); restoringHist=false;
}
function undo(){ if(histIndex>0){ histIndex--; restoreHist(undoHist[histIndex]); } }
function redo(){ if(histIndex<undoHist.length-1){ histIndex++; restoreHist(undoHist[histIndex]); } }
window.addEventListener("keydown",e=>{
  const t=e.target, tag=t&&t.tagName;
  const inField = tag==="INPUT"||tag==="TEXTAREA"||(t&&t.isContentEditable);
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="s"){ e.preventDefault(); saveWorld(e.shiftKey); return; }  // Ctrl+S 저장 / Ctrl+Shift+S 다른 이름으로
  if(inField) return;   // 입력 필드에선 브라우저 기본 실행취소 사용
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="z"){
    e.preventDefault(); if(e.shiftKey) redo(); else undo();
  } else if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="y"){ e.preventDefault(); redo(); }
});

/* ============ 이미지 첨부 ============ */
let keepPng=false;   // 체크 시 PNG(투명) 유지, 아니면 JPEG로 축소
function pickItemImage(id){
  const inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return;
    resizeImage(f,1000).then(dataUrl=>{
      const it=findItem(id); if(!it) return;
      it.ref.image=dataUrl; renderDetail(); renderLeft(); renderPins(); markDirty();
    });

function removeItemImage(id){

/* 업로드 이미지를 최대 변 maxDim 으로 축소해 dataURL 로 변환.
   keepPng 이거나 원본이 PNG면 투명 유지(PNG), 아니면 용량 절약(JPEG) */
function resizeImage(file,maxDim){
  return new Promise(res=>{
    const usePng = keepPng || file.type==="image/png";
    const img=new Image();
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(Math.max(w,h)>maxDim){ const r=maxDim/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      res(usePng ? cv.toDataURL("image/png") : cv.toDataURL("image/jpeg",0.85));
    };
    const fr=new FileReader(); fr.onload=()=>img.src=fr.result; fr.readAsDataURL(file);
  });
}
/* 이미지 표시 조절: 맞춤 방식 / 높이 / 초점(드래그) */
function setImgFit(f){ const it=findItem(sel.id); if(!it)return; it.ref.imgFit=f; renderDetail(); markDirty(); }
function setImgH(v){ const it=findItem(sel.id); if(!it)return; it.ref.imgH=+v;
  const fr=document.getElementById("imgFrame"); if(fr) fr.style.height=v+"px"; markDirty(); }
function parsePos(s){ const p=(s||"50% 50%").split(" "); return {x:parseFloat(p[0])||50, y:parseFloat(p[1])||50}; }
function attachImgDrag(){
  const img=document.getElementById("detImg"); if(!img) return;
  const it=findItem(sel.id); if(!it || (it.ref.imgFit||"cover")!=="cover") return;
  img.style.cursor="grab";
  img.addEventListener("pointerdown",e=>{
    e.preventDefault(); img.style.cursor="grabbing";
    const st=parsePos(it.ref.imgPos), rect=img.getBoundingClientRect();
    const sx=e.clientX, sy=e.clientY;
    const mv=ev=>{
      let px=st.x-(ev.clientX-sx)/rect.width*100;   // 드래그와 반대로 초점 이동(이미지를 미는 느낌)
      let py=st.y-(ev.clientY-sy)/rect.height*100;
      px=Math.max(0,Math.min(100,px)); py=Math.max(0,Math.min(100,py));
      it.ref.imgPos=`${px.toFixed(1)}% ${py.toFixed(1)}%`;
      img.style.objectPosition=it.ref.imgPos;
    };
    const up=()=>{ img.style.cursor="grab"; window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up); markDirty(); };
    window.addEventListener("pointermove",mv); window.addEventListener("pointerup",up);
  });
}

/* ============ 위키식 상호링크 {{이름}} ============ */
function renderWiki(text){
  if(!text) return "";
  const re=/\{\{([^}]+)\}\}/g; let out="", last=0, m;
  while((m=re.exec(text))){
    out+=esc(text.slice(last,m.index));
    const name=m[1].trim();
    const item=allItems().find(it=>(it.name||"").toLowerCase()===name.toLowerCase());
    out+= item
      ? `<a class="wlink" onclick="selectItem('${item.id}')">${esc(item.name)}</a>`
      : `<span class="wlink miss" title="${t("일치하는 항목 없음")}">${esc(name)}</span>`;
    last=m.index+m[0].length;
  }
  out+=esc(text.slice(last));
  return out.replace(/\n/g,"<br>");
}
function stripWiki(t){ return (t||"").replace(/\{\{([^}]+)\}\}/g,"$1"); }
function updDesc(val){
  const it=findItem(sel.id); if(!it) return;
  it.ref.desc=val; renderLeft(); markDirty();
}
/* 설명: 평소엔 링크가 적용된 모습, 클릭하면 원문 편집, 편집을 마치면 다시 링크 적용 */
function editDesc(){
  const wv=document.getElementById("wikiView"), ed=document.getElementById("descEdit");
  if(!ed||!wv) return;
  wv.style.display="none"; ed.style.display="block"; ed.focus();
  ed.selectionStart=ed.selectionEnd=ed.value.length;
}
function doneDesc(){
  const wv=document.getElementById("wikiView"), ed=document.getElementById("descEdit");
  if(!ed||!wv) return;
  wv.innerHTML = ed.value ? renderWiki(ed.value) : `<span class="wiki-empty">${t("클릭하여 설명 입력…")}</span>`;
  ed.style.display="none"; wv.style.display="block";
}

/* ============ 오른쪽 사이드바 너비 조절 ============
   오른쪽 끝은 창에 고정, 왼쪽 가장자리를 드래그해 너비 변경 */
(function(){
  const rz=document.getElementById("rightResizer"), right=document.getElementById("right");
  try{ const w=localStorage.getItem("we_right_w"); if(w) right.style.width=w+"px"; }catch(e){}
  rz.addEventListener("pointerdown",e=>{
    e.preventDefault(); rz.classList.add("drag");
    const mv=ev=>{
      let w=window.innerWidth-ev.clientX;      // 오른쪽 끝은 창 끝에 고정
      w=Math.max(240,Math.min(700,w));
      right.style.width=w+"px";
    };
    const up=()=>{
      rz.classList.remove("drag");
      window.removeEventListener("pointermove",mv); window.removeEventListener("pointerup",up);
      try{ localStorage.setItem("we_right_w", parseInt(right.style.width)); }catch(e){}
    };
    window.addEventListener("pointermove",mv); window.addEventListener("pointerup",up);
  });
})();
